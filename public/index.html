<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorkOrder Pro</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#001e40">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WO Pro">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;display:flex;height:100vh;overflow:hidden}
#login-screen{position:fixed;inset:0;background:#001e40;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px}
#login-screen.hidden{display:none}
.ll{font-size:32px;font-weight:800;color:#fff}.ll span{color:#3b82f6}
.ls{color:#94a3b8;font-size:15px;margin-top:-12px}
.lc{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:340px;display:flex;flex-direction:column;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lc h2{font-size:18px;font-weight:700;color:#1e293b;text-align:center}
.lc p{font-size:13px;color:#64748b;text-align:center;margin-top:-8px}
.ub{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid #e2e8f0;border-radius:12px;background:#fff;cursor:pointer;transition:all .15s;width:100%}
.ub:hover,.ub:active{border-color:#2563eb;background:#eff6ff}
.ua2{width:44px;height:44px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.un{font-size:16px;font-weight:700;color:#1e293b;text-align:left}
.ur{font-size:12px;color:#64748b;text-align:left}
.lv{color:#475569;font-size:12px}
#sidebar{width:220px;background:#001e40;color:#fff;display:flex;flex-direction:column;flex-shrink:0}
#sidebar .logo{padding:20px 16px 16px;font-size:18px;font-weight:700;border-bottom:1px solid #0a3060}
#sidebar .logo span{color:#3b82f6}
#sidebar nav a{display:flex;align-items:center;gap:10px;padding:11px 16px;color:#94a3b8;text-decoration:none;font-size:14px;cursor:pointer;transition:all .15s}
#sidebar nav a:hover,#sidebar nav a.active{background:#0a3060;color:#fff}
#sidebar nav a svg{width:18px;height:18px;flex-shrink:0}
#sidebar .ua{margin-top:auto;padding:12px 16px;border-top:1px solid #0a3060;font-size:13px;color:#94a3b8;display:flex;align-items:center;justify-content:space-between}
#sidebar .ua strong{color:#fff;display:block}
#sidebar .ua .logout{background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;padding:4px 8px;border-radius:4px}
.logout:hover{color:#fff}
#main{flex:1;display:flex;overflow:hidden}
#lp{width:370px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
.lh{padding:16px;border-bottom:1px solid #e2e8f0}
.lh h2{font-size:18px;font-weight:700;margin-bottom:12px}
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tabs button{flex:1;padding:6px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:6px;font-size:13px;cursor:pointer;transition:all .15s}
.tabs button.active{background:#2563eb;color:#fff;border-color:#2563eb}
.sr{display:flex;gap:8px}
.sr input{flex:1;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none}
.sr input:focus{border-color:#2563eb}
.sb{padding:7px 10px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
#nwb{display:flex;align-items:center;justify-content:center;gap:6px;margin:12px 16px 0;padding:9px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
#nwb:hover{background:#1d4ed8}
#wol{flex:1;overflow-y:auto;padding:8px}
.wc{padding:12px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s;background:#fff}
.wc:hover{border-color:#2563eb;box-shadow:0 2px 8px rgba(37,99,235,.1)}
.wc.sel{border-color:#2563eb;background:#eff6ff}
.wc .wn{font-size:11px;color:#94a3b8;margin-bottom:3px}
.wc .wt{font-weight:600;font-size:14px;margin-bottom:6px}
.wc .wm{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:#64748b;align-items:center}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.s-open{background:#dbeafe;color:#1d4ed8}.s-inprogress{background:#fef3c7;color:#d97706}
.s-onhold{background:#f3e8ff;color:#7c3aed}.s-done{background:#d1fae5;color:#065f46}
.p-high{background:#fee2e2;color:#dc2626}.p-medium{background:#fef3c7;color:#d97706}
.p-low{background:#d1fae5;color:#16a34a}.p-none{background:#f1f5f9;color:#64748b}
#dp{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8fafc}
.es{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;gap:12px}
.es svg{width:60px;height:60px;opacity:.3}
.es p{font-size:15px}
#dv{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tbr{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid #e2e8f0;background:#fff;flex-wrap:wrap}
.tbr button{padding:6px 12px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:#64748b}
.tbr button:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.dh{background:#fff;padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.dhl{flex:1}
.dh .wnum{font-size:12px;color:#94a3b8;margin-bottom:4px}
.dh h3{font-size:20px;font-weight:700;margin-bottom:10px}
.stbs{display:flex;gap:8px;flex-wrap:wrap}
.stb{padding:6px 14px;border:2px solid #e2e8f0;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;transition:all .15s}
.stb.a-open{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
.stb.a-inprogress{background:#fef3c7;border-color:#d97706;color:#d97706}
.stb.a-onhold{background:#f3e8ff;border-color:#7c3aed;color:#7c3aed}
.stb.a-done{background:#d1fae5;border-color:#059669;color:#065f46}
.dhr{display:flex;gap:8px;flex-shrink:0}
.ib{padding:8px;border:1px solid #e2e8f0;background:#fff;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ib:hover{background:#f1f5f9}
.ib svg{width:18px;height:18px;color:#64748b}
.db{flex:1;overflow-y:auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-content:start}
.dc{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px}
.dc h4{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.dc.fw{grid-column:1/-1}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fi{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.fi:last-child{margin-bottom:0}
.fl{font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase}
.fv{font-size:14px;color:#1e293b;font-weight:500}
.fv.mt{color:#cbd5e1;font-style:italic}
table.pt{width:100%;border-collapse:collapse;font-size:13px}
table.pt th{text-align:left;padding:8px 10px;background:#f8fafc;border-bottom:2px solid #e2e8f0;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase}
table.pt td{padding:8px 10px;border-bottom:1px solid #f1f5f9}
table.pt tr:last-child td{border-bottom:none}
.dp2{background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.dp2:hover{background:#fee2e2}
.apr{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.apr input{padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none}
.apr input:focus{border-color:#2563eb}
.apr .pn{flex:2;min-width:100px}
.apr .pq{width:55px}
.apr .pc{width:75px}
.apr button{padding:6px 12px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.ptot{text-align:right;font-size:13px;font-weight:700;margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0}
.cl{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;max-height:300px;overflow-y:auto}
.ci{background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e2e8f0}
.cm{font-size:11px;color:#94a3b8;margin-bottom:4px}
.cm strong{color:#64748b}
.ct2{font-size:14px;color:#1e293b}
.cir{display:flex;gap:8px}
.cir textarea{flex:1;padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;resize:vertical;min-height:60px;font-family:inherit;outline:none}
.cir textarea:focus{border-color:#2563eb}
.cir button{padding:8px 14px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;align-self:flex-end}
.al{display:flex;flex-direction:column;gap:8px}
.ai{display:flex;gap:10px;font-size:13px;color:#64748b}
.ad{width:8px;height:8px;border-radius:50%;background:#2563eb;margin-top:5px;flex-shrink:0}
.at{font-size:11px;color:#94a3b8;margin-top:2px}
#mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
#mo.hidden,#pmo.hidden,#amo.hidden{display:none}
#md,#pmd,#amd{background:#fff;border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
#pmd{max-width:760px}
.mh{padding:20px 24px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.mh h3{font-size:18px;font-weight:700}
.mcl{background:none;border:none;font-size:22px;cursor:pointer;color:#64748b;line-height:1}
.mb2{padding:24px;display:flex;flex-direction:column;gap:16px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{padding:9px 11px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fg textarea{resize:vertical;min-height:80px}
.fg.full{grid-column:1/-1}
.mft{padding:16px 24px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:10px}
.bcn{padding:9px 18px;border:1px solid #e2e8f0;background:#fff;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:#64748b}
.bsv{padding:9px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.bsv:hover{background:#1d4ed8}
.bkbtn{display:none;align-items:center;gap:6px;padding:12px 16px;background:#fff;border:none;border-bottom:1px solid #e2e8f0;font-size:14px;font-weight:600;color:#2563eb;cursor:pointer;width:100%}
/* ===== Procedures view ===== */
#procView{flex:1;display:none;flex-direction:column;background:#f8fafc;overflow:hidden}
#procView.show{display:flex}
.pvHead{padding:16px 20px;border-bottom:1px solid #e2e8f0;background:#fff;display:flex;justify-content:space-between;align-items:center}
.pvHead h2{font-size:20px;font-weight:700}
.pvBody{flex:1;overflow-y:auto;padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;align-content:start}
.pcard{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;cursor:pointer;transition:all .15s}
.pcard:hover{border-color:#2563eb;box-shadow:0 4px 12px rgba(37,99,235,.08)}
.pcard h5{font-size:15px;font-weight:700;margin-bottom:6px}
.pcard .pcd{font-size:12px;color:#64748b;margin-bottom:10px;line-height:1.4;min-height:34px}
.pcard .pcm{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#94a3b8}
.pcard .pca{display:flex;gap:6px}
.pcard .pca button{padding:5px 10px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;color:#64748b}
.pcard .pca button:hover{background:#eff6ff;color:#2563eb;border-color:#2563eb}
.pcard .pca button.del{color:#dc2626}
.pcard .pca button.del:hover{background:#fee2e2;border-color:#dc2626}
.pvEmpty{grid-column:1/-1;text-align:center;color:#94a3b8;padding:40px 20px;font-size:14px}
/* ===== Procedure builder modal ===== */
.psec{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:12px}
.psec .psh{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.psec .psh input{flex:1;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;font-weight:600;outline:none;background:#fff}
.psec .psh input:focus{border-color:#2563eb}
.psec .psh button{padding:6px 10px;border:1px solid #e2e8f0;background:#fff;border-radius:6px;cursor:pointer;font-size:13px;color:#64748b}
.psec .psh button.del{color:#dc2626}
.pf{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pf .pfo{display:flex;flex-direction:column;gap:2px}
.pf .pfo button{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:12px;line-height:1}
.pf .pfo button:hover{color:#2563eb}
.pf input.pfl{flex:2;min-width:140px;padding:7px 9px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none}
.pf input.pfl:focus{border-color:#2563eb}
.pf select.pft{padding:7px 9px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;background:#fff}
.pf .pfr{display:flex;align-items:center;gap:5px;font-size:12px;color:#64748b;cursor:pointer}
.pf .pfd{background:none;border:none;color:#dc2626;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.pf .pfd:hover{background:#fee2e2}
.psec .paf{padding:7px 12px;border:1px dashed #cbd5e1;background:#fff;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:#64748b;width:100%;margin-top:4px}
.psec .paf:hover{border-color:#2563eb;color:#2563eb}
.pas{padding:9px 14px;border:1px dashed #94a3b8;background:#fff;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#475569;width:100%;margin-top:8px}
.pas:hover{border-color:#2563eb;color:#2563eb}
/* ===== Procedure card on WO detail ===== */
.proAtt{border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:12px;background:#f8fafc}
.proAtt .pah{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.proAtt .pah h5{font-size:15px;font-weight:700}
.proAtt .padesc{font-size:12px;color:#64748b;margin-bottom:8px}
.proAtt .pprog{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:12px}
.proAtt .pprog>div{height:100%;background:#2563eb;transition:width .2s}
.proAtt .pprogt{font-size:11px;color:#64748b;margin-bottom:10px}
.proAtt .psecRender{margin-bottom:10px}
.proAtt .psecRender h6{font-size:12px;font-weight:700;color:#1e293b;text-transform:uppercase;letter-spacing:.3px;padding-bottom:5px;border-bottom:1px solid #e2e8f0;margin-bottom:8px}
.proAtt .pfield{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:13px}
.proAtt .pfield.col{flex-direction:column;align-items:stretch;gap:4px}
.proAtt .pfield label{font-size:13px;color:#1e293b;flex:1;cursor:pointer}
.proAtt .pfield input[type=checkbox]{width:18px;height:18px;cursor:pointer;flex-shrink:0}
.proAtt .pfield input[type=text],.proAtt .pfield input[type=number]{padding:6px 9px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;width:100%;font-family:inherit}
.proAtt .pfield input:focus{border-color:#2563eb}
.proAtt .pfield .pflbl{font-size:12px;color:#64748b;font-weight:600}
.proAtt .pfRequired{color:#dc2626;margin-left:2px}
.proAtt .pfPF{display:flex;gap:6px}
.proAtt .pfPF button{padding:5px 12px;border:1.5px solid #e2e8f0;background:#fff;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:#64748b}
.proAtt .pfPF button.act-pass{background:#d1fae5;border-color:#059669;color:#065f46}
.proAtt .pfPF button.act-fail{background:#fee2e2;border-color:#dc2626;color:#dc2626}
.proAtt .pfPF button.act-flag{background:#fef3c7;border-color:#d97706;color:#92400e}
.proAtt .padone{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0}
.proAtt .padone button{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;border:1px solid #e2e8f0}
.proAtt .padone .pacomp{background:#2563eb;color:#fff;border-color:#2563eb}
.proAtt .padone .pacomp.done{background:#059669;border-color:#059669}
.proAtt .padone .padet{background:#fff;color:#dc2626;border-color:#fecaca}
.proAtt .padone .padet:hover{background:#fee2e2}
.attachBox{padding:12px;background:#fff;border:1px dashed #cbd5e1;border-radius:8px;display:flex;gap:8px;align-items:center}
.attachBox select{flex:1;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none}
.attachBox button{padding:7px 14px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
#toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .3s;z-index:2000;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
@media print{
  #sidebar,#lp,.dhr,.stbs,.apr,.cir,.tbr,#login-screen,#procView{display:none!important}
  #main,#dp,#dv,.db{display:block!important;overflow:visible!important}
  .dc{break-inside:avoid;margin-bottom:12px}
  body{background:#fff}
}
@media(max-width:768px){
  body{flex-direction:column}
  #sidebar{width:100%;height:56px;flex-direction:row;position:fixed;bottom:0;left:0;right:0;z-index:500;border-top:1px solid #0a3060;overflow:hidden}
  #sidebar .logo{display:none}#sidebar .ua{display:none}
  #sidebar nav{display:flex;flex-direction:row;width:100%}
  #sidebar nav a{flex-direction:column;gap:2px;padding:6px 4px;font-size:10px;flex:1;justify-content:center;align-items:center;border-radius:0}
  #sidebar nav a svg{width:20px;height:20px}
  #main{padding-bottom:56px;height:calc(100vh - 56px)}
  #dp{width:100%;position:fixed;top:0;left:0;right:0;bottom:56px;background:#f8fafc;transform:translateX(100%);transition:transform .25s ease;z-index:100}
  #dp.show-mobile{transform:translateX(0)}
  .db{grid-template-columns:1fr;padding:12px}
  .dc.fw{grid-column:1}.dh{flex-direction:column;gap:8px}
  .fr2{grid-template-columns:1fr 1fr}
  #mo,#pmo,#amo{align-items:flex-end;padding:0}
  #md,#pmd,#amd{border-radius:16px 16px 0 0;max-height:92vh}
  .bkbtn{display:flex!important}
  #toast{bottom:70px}.lc{width:85%}
  .pvBody{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="login-screen">
  <div class="ll">WorkOrder<span>Pro</span></div>
  <div class="ls">Work Order Management</div>
  <div class="lc">
    <h2>Who are you?</h2>
    <p>Tap your name to sign in</p>
    <button class="ub" onclick="doLogin('Bill')"><div class="ua2" style="background:#2563eb">B</div><div><div class="un">Bill</div><div class="ur">Administrator</div></div></button>
    <button class="ub" onclick="doLogin('Serina')"><div class="ua2" style="background:#7c3aed">S</div><div><div class="un">Serina</div><div class="ur">Team Member</div></div></button>
  </div>
  <div class="lv">WorkOrder Pro v1.1</div>
</div>
<div id="sidebar">
