<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WorkOrder Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;background:#001e40;color:#fff;display:flex;flex-direction:column;flex-shrink:0}
#sidebar .logo{padding:20px 16px 16px;font-size:18px;font-weight:700;border-bottom:1px solid #0a3060}
#sidebar .logo span{color:#3b82f6}
#sidebar nav a{display:flex;align-items:center;gap:10px;padding:11px 16px;color:#94a3b8;text-decoration:none;font-size:14px;cursor:pointer;transition:all .15s}
#sidebar nav a:hover,#sidebar nav a.active{background:#0a3060;color:#fff}
#sidebar nav a svg{width:18px;height:18px;flex-shrink:0}
#sidebar .ua{margin-top:auto;padding:12px 16px;border-top:1px solid #0a3060;font-size:13px;color:#94a3b8}
#sidebar .ua strong{color:#fff;display:block}
#main{flex:1;display:flex;overflow:hidden}
#lp{width:370px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
.lh{padding:16px;border-bottom:1px solid #e2e8f0}
.lh h2{font-size:18px;font-weight:700;margin-bottom:12px}
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tabs button{flex:1;padding:6px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:6px;font-size:13px;cursor:pointer;transition:all .15s}
.tabs button.active{background:#2563eb;color:#fff;border-color:#2563eb}
.sr{display:flex;gap:8px}
.sr input{flex:1;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none}
.sr input:focus{border-color:#2563eb}
.sb{padding:7px 10px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
#nwb{display:flex;align-items:center;justify-content:center;gap:6px;margin:12px 16px 0;padding:9px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
#nwb:hover{background:#1d4ed8}
#wol{flex:1;overflow-y:auto;padding:8px}
.wc{padding:12px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .15s;background:#fff}
.wc:hover{border-color:#2563eb;box-shadow:0 2px 8px rgba(37,99,235,.1)}
.wc.sel{border-color:#2563eb;background:#eff6ff}
.wc .wn{font-size:11px;color:#94a3b8;margin-bottom:3px}
.wc .wt{font-weight:600;font-size:14px;margin-bottom:6px}
.wc .wm{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:#64748b;align-items:center}
.wc .wp{float:right;margin-left:8px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.s-open{background:#dbeafe;color:#1d4ed8}
.s-inprogress{background:#fef3c7;color:#d97706}
.s-onhold{background:#f3e8ff;color:#7c3aed}
.s-done{background:#d1fae5;color:#065f46}
.p-high{background:#fee2e2;color:#dc2626}
.p-medium{background:#fef3c7;color:#d97706}
.p-low{background:#d1fae5;color:#16a34a}
.p-none{background:#f1f5f9;color:#64748b}
#dp{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8fafc}
.es{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;gap:12px}
.es svg{width:60px;height:60px;opacity:.3}
.es p{font-size:15px}
#dv{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tbr{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid #e2e8f0;background:#fff;flex-wrap:wrap}
.tbr button{padding:6px 12px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:#64748b}
.tbr button:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.dh{background:#fff;padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.dhl{flex:1}
.dh .wnum{font-size:12px;color:#94a3b8;margin-bottom:4px}
.dh h3{font-size:20px;font-weight:700;margin-bottom:10px}
.stbs{display:flex;gap:8px;flex-wrap:wrap}
.stb{padding:6px 14px;border:2px solid #e2e8f0;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;transition:all .15s}
.stb.a-open{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
.stb.a-inprogress{background:#fef3c7;border-color:#d97706;color:#d97706}
.stb.a-onhold{background:#f3e8ff;border-color:#7c3aed;color:#7c3aed}
.stb.a-done{background:#d1fae5;border-color:#059669;color:#065f46}
.dhr{display:flex;gap:8px;flex-shrink:0}
.ib{padding:8px;border:1px solid #e2e8f0;background:#fff;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ib:hover{background:#f1f5f9}
.ib svg{width:18px;height:18px;color:#64748b}
.db{flex:1;overflow-y:auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-content:start}
.dc{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px}
.dc h4{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.dc.fw{grid-column:1/-1}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fi{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.fi:last-child{margin-bottom:0}
.fl{font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase}
.fv{font-size:14px;color:#1e293b;font-weight:500}
.fv.mt{color:#cbd5e1;font-style:italic}
table.pt{width:100%;border-collapse:collapse;font-size:13px}
table.pt th{text-align:left;padding:8px 10px;background:#f8fafc;border-bottom:2px solid #e2e8f0;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase}
table.pt td{padding:8px 10px;border-bottom:1px solid #f1f5f9}
table.pt tr:last-child td{border-bottom:none}
.dp2{background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.dp2:hover{background:#fee2e2}
.apr{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.apr input{padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none}
.apr input:focus{border-color:#2563eb}
.apr .pn{flex:2;min-width:100px}
.apr .pq{width:55px}
.apr .pc{width:75px}
.apr button{padding:6px 12px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.ptot{text-align:right;font-size:13px;font-weight:700;margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0}
.cl{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;max-height:300px;overflow-y:auto}
.ci{background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e2e8f0}
.cm{font-size:11px;color:#94a3b8;margin-bottom:4px}
.cm strong{color:#64748b}
.ct2{font-size:14px;color:#1e293b}
.cir{display:flex;gap:8px}
.cir textarea{flex:1;padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;resize:vertical;min-height:60px;font-family:inherit;outline:none}
.cir textarea:focus{border-color:#2563eb}
.cir button{padding:8px 14px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;align-self:flex-end}
.al{display:flex;flex-direction:column;gap:8px}
.ai{display:flex;gap:10px;font-size:13px;color:#64748b}
.ad{width:8px;height:8px;border-radius:50%;background:#2563eb;margin-top:5px;flex-shrink:0}
.at{font-size:11px;color:#94a3b8;margin-top:2px}
#mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
#mo.hidden{display:none}
#md{background:#fff;border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mh{padding:20px 24px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.mh h3{font-size:18px;font-weight:700}
.mcl{background:none;border:none;font-size:22px;cursor:pointer;color:#64748b;line-height:1}
.mb2{padding:24px;display:flex;flex-direction:column;gap:16px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{padding:9px 11px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.fg textarea{resize:vertical;min-height:80px}
.fg.full{grid-column:1/-1}
.mft{padding:16px 24px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:10px}
.bcn{padding:9px 18px;border:1px solid #e2e8f0;background:#fff;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:#64748b}
.bsv{padding:9px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.bsv:hover{background:#1d4ed8}
#toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .3s;z-index:2000;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
@media print{
  #sidebar,#lp,.dhr,.stbs,.apr,.cir,.tbr{display:none!important}
  #main,#dp,#dv,.db{display:block!important;overflow:visible!important}
  .dc{break-inside:avoid;margin-bottom:12px}
  body{background:#fff}
}
</style>
</head>
<body>
<div id="sidebar">
  <div class="logo">WorkOrder<span>Pro</span></div>
  <nav>
    <a class="active" onclick="setNav(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Work Orders</a>
    <a onclick="setNav(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>Assets</a>
    <a onclick="setNav(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Team</a>
    <a onclick="setNav(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Inventory</a>
    <a onclick="setNav(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reports</a>
  </nav>
  <div class="ua"><strong>Bill</strong>WorkOrder Pro v1.0</div>
</div>
<div id="main">
  <div id="lp">
    <div class="lh">
      <h2>Work Orders</h2>
      <div class="tabs">
        <button id="tab-todo" class="active" onclick="switchTab('todo')">To Do</button>
        <button id="tab-done" onclick="switchTab('done')">Done</button>
        <button id="tab-all" onclick="switchTab('all')">All</button>
      </div>
      <div class="sr">
        <input type="text" id="si" placeholder="Search work orders..." oninput="renderList()">
        <button class="sb" onclick="cycleSort()" id="srtb">Newest ▾</button>
      </div>
    </div>
    <button id="nwb" onclick="openModal(null)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Work Order
    </button>
    <div id="wol"></div>
  </div>
  <div id="dp">
    <div class="es" id="es">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      <p>Select a work order to view details</p>
    </div>
    <div id="dv" style="display:none"></div>
  </div>
</div>
<div id="mo" class="hidden">
  <div id="md">
    <div class="mh"><h3 id="mt">New Work Order</h3><button class="mcl" onclick="closeModal()">×</button></div>
    <div class="mb2">
      <div class="fg full"><label>Title *</label><input type="text" id="f-title" placeholder="Work order title"></div>
      <div class="fg full"><label>Description</label><textarea id="f-desc" placeholder="Describe the work to be done..."></textarea></div>
      <div class="fr2">
        <div class="fg"><label>Status</label><select id="f-status"><option>Open</option><option>In Progress</option><option>On Hold</option><option>Done</option></select></div>
        <div class="fg"><label>Priority</label><select id="f-priority"><option>None</option><option>Low</option><option>Medium</option><option>High</option></select></div>
      </div>
      <div class="fr2">
        <div class="fg"><label>Assigned To</label><input type="text" id="f-assignee" placeholder="e.g. Bill"></div>
        <div class="fg"><label>Work Type</label><select id="f-type"><option value="">Select...</option><option>Preventive Maintenance</option><option>Corrective Maintenance</option><option>Inspection</option><option>Installation</option><option>Safety</option><option>Other</option></select></div>
      </div>
      <div class="fr2">
        <div class="fg"><label>Asset</label><input type="text" id="f-asset" placeholder="e.g. HVAC Unit #3"></div>
        <div class="fg"><label>Location</label><input type="text" id="f-location" placeholder="e.g. Building A, Floor 2"></div>
      </div>
      <div class="fr2">
        <div class="fg"><label>Due Date</label><input type="date" id="f-due"></div>
        <div class="fg"><label>Est. Time (hrs)</label><input type="number" id="f-time" placeholder="2" min="0" step="0.5"></div>
      </div>
    </div>
    <div class="mft">
      <button class="bcn" onclick="closeModal()">Cancel</button>
      <button class="bsv" onclick="saveWO()">Save Work Order</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
const API="http://localhost:3000/api";
const ME="Bill";
let WOs=[],selId=null,curTab="todo",sIdx=0,editId=null;
const SLBLS=["Newest","Oldest","Priority","A-Z"];
const PORD={High:0,Medium:1,Low:2,None:3};

async function apiFetch(m,p,b){
  const o={method:m,headers:{"Content-Type":"application/json"}};
  if(b) o.body=JSON.stringify(b);
  const r=await fetch(API+p,o);
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadData(){
  try{ WOs=await apiFetch("GET","/workorders"); }
  catch{ WOs=JSON.parse(localStorage.getItem("wop")||"null")||getSample(); }
  renderList();
  if(selId) renderDetail(selId);
}

function localSave(){ localStorage.setItem("wop",JSON.stringify(WOs)); }

function getSample(){
  const n=new Date().toISOString();
  return [
    {id:"s1",woNumber:"WO-0001",title:"HVAC Filter Replacement",description:"Replace all air filters on HVAC units in Building A. Check refrigerant levels.",status:"In Progress",priority:"High",assignee:"Bill",workType:"Preventive Maintenance",asset:"HVAC Unit #1",location:"Building A, Roof",dueDate:"2026-05-10",estimatedTime:3,createdAt:"2026-05-01T09:00:00Z",updatedAt:n,comments:[{id:"c1",author:"Bill",text:"Filters ordered, arriving tomorrow.",time:"2026-05-02T10:00:00Z"}],parts:[{id:"p1",name:"Air Filter 20x25x4",qty:4,cost:18.99}],activity:[{text:"Created by Bill",time:"2026-05-01T09:00:00Z"},{text:"Bill updated status to In Progress",time:"2026-05-02T08:00:00Z"}]},
    {id:"s2",woNumber:"WO-0002",title:"Parking Lot Light Repair",description:"Three lights in section C are out. Replace bulbs and inspect wiring.",status:"Open",priority:"Medium",assignee:"Bill",workType:"Corrective Maintenance",asset:"Lighting System",location:"Parking Lot C",dueDate:"2026-05-12",estimatedTime:2,createdAt:"2026-05-02T11:00:00Z",updatedAt:n,comments:[],parts:[{id:"p2",name:"LED Bulb 150W",qty:3,cost:24.50}],activity:[{text:"Created by Bill",time:"2026-05-02T11:00:00Z"}]},
    {id:"s3",woNumber:"WO-0003",title:"Boiler Annual Inspection",description:"Annual safety inspection of main boiler. Check pressure, valves, and safety cutoffs.",status:"Open",priority:"High",assignee:"Bill",workType:"Inspection",asset:"Main Boiler",location:"Basement Mechanical Room",dueDate:"2026-05-15",estimatedTime:4,createdAt:"2026-05-03T08:00:00Z",updatedAt:n,comments:[],parts:[],activity:[{text:"Created by Bill",time:"2026-05-03T08:00:00Z"}]},
    {id:"s4",woNumber:"WO-0004",title:"Roof Gutter Cleaning",description:"Clear debris from all gutters. Ensure proper drainage away from the building.",status:"Done",priority:"Low",assignee:"Bill",workType:"Preventive Maintenance",asset:"Roof/Gutters",location:"Building A & B Roof",dueDate:"2026-04-30",estimatedTime:3,createdAt:"2026-04-25T09:00:00Z",updatedAt:n,comments:[{id:"c3",author:"Bill",text:"Completed. Found minor damage on north side, logged separately.",time:"2026-04-30T14:00:00Z"}],parts:[],activity:[{text:"Created by Bill",time:"2026-04-25T09:00:00Z"},{text:"Bill updated status to Done",time:"2026-04-30T14:00:00Z"}]}
  ];
}

function sbadge(s){const k=s.toLowerCase().replace(/ /g,"");return`<span class="badge s-${k}">${s}</span>`;}
function pbadge(p){return`<span class="badge p-${(p||"none").toLowerCase()}">${p||"None"}</span>`;}
function fmtDate(d){if(!d)return"—";return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function ago(t){const s=(Date.now()-new Date(t))/1000;if(s<60)return"just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return Math.floor(s/86400)+"d ago";}
function fv(v){return v?`<span class="fv">${v}</span>`:`<span class="fv mt">Not set</span>`;}

function renderList(){
  const q=(document.getElementById("si").value||"").toLowerCase();
  document.getElementById("srtb").textContent=SLBLS[sIdx]+" ▾";
  let list=[...WOs].filter(w=>{
    const mt=curTab==="all"?true:curTab==="done"?w.status==="Done":w.status!=="Done";
    const ms=!q||[w.title,w.woNumber,w.assignee,w.asset,w.location].some(x=>(x||"").toLowerCase().includes(q));
    return mt&&ms;
  });
  if(sIdx===0) list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  else if(sIdx===1) list.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  else if(sIdx===2) list.sort((a,b)=>(PORD[a.priority]||3)-(PORD[b.priority]||3));
  else list.sort((a,b)=>a.title.localeCompare(b.title));
  const el=document.getElementById("wol");
  if(!list.length){el.innerHTML=`<div style="text-align:center;color:#94a3b8;padding:30px 20px;font-size:14px">No work orders found</div>`;return;}
  el.innerHTML=list.map(w=>`<div class="wc${w.id===selId?" sel":""}" onclick="selectWO('${w.id}')">
    <div class="wn">${w.woNumber||""} ${w.dueDate?`· Due ${fmtDate(w.dueDate)}`:""}</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div class="wt" style="flex:1;margin-right:8px">${w.title}</div>
      ${pbadge(w.priority)}
    </div>
    <div class="wm">${sbadge(w.status||"Open")}${w.assignee?`<span>👤 ${w.assignee}</span>`:""}</div>
  </div>`).join("");
}

function selectWO(id){ selId=id; renderList(); renderDetail(id); }

function renderDetail(id){
  const w=WOs.find(x=>x.id===id);
  if(!w){ document.getElementById("es").style.display="flex"; document.getElementById("dv").style.display="none"; return; }
  document.getElementById("es").style.display="none";
  document.getElementById("dv").style.display="flex";
  const parts=w.parts||[], comments=w.comments||[], activity=[...(w.activity||[])].reverse();
  const totalCost=parts.reduce((s,p)=>s+(parseFloat(p.qty)||0)*(parseFloat(p.cost)||0),0);
  const statuses=["Open","In Progress","On Hold","Done"];
  document.getElementById("dv").innerHTML=`
  <div class="tbr">
    <button onclick="exportData()">⬇ Export JSON</button>
    <button onclick="triggerImport()">⬆ Import JSON</button>
    <button onclick="printWO()">🖨 Print</button>

async function setStatus(id,status){
  const w=WOs.find(x=>x.id===id);
  if(!w) return;
  const prev=w.status;
  w.status=status;
  w.updatedAt=new Date().toISOString();
  (w.activity=w.activity||[]).push({text:`${ME} updated status to ${status}`,time:new Date().toISOString()});
  try{ await apiFetch("PUT","/workorders/"+id,w); }
  catch{ localSave(); }
  renderList(); renderDetail(id);
  showToast("Status updated to "+status);
}

async function addPart(id){
  const name=document.getElementById("pname").value.trim();
  const qty=parseFloat(document.getElementById("pqty").value)||1;
  const cost=parseFloat(document.getElementById("pcost").value)||0;
  if(!name){ showToast("Enter a part name"); return; }
  const w=WOs.find(x=>x.id===id);
  if(!w) return;
  const part={id:"p"+Date.now(),name,qty,cost};
  (w.parts=w.parts||[]).push(part);
  w.updatedAt=new Date().toISOString();
  (w.activity=w.activity||[]).push({text:`${ME} added part: ${name}`,time:new Date().toISOString()});
  try{ await apiFetch("PUT","/workorders/"+id,w); }
  catch{ localSave(); }
  renderDetail(id); showToast("Part added");
}

async function deletePart(id,pid){
  const w=WOs.find(x=>x.id===id);
  if(!w) return;
  w.parts=(w.parts||[]).filter(p=>p.id!==pid);
  w.updatedAt=new Date().toISOString();
  try{ await apiFetch("PUT","/workorders/"+id,w); }
  catch{ localSave(); }
  renderDetail(id); showToast("Part removed");
}

async function addComment(id){
  const txt=document.getElementById("ctxt").value.trim();
  if(!txt){ showToast("Write a comment first"); return; }
  const w=WOs.find(x=>x.id===id);
  if(!w) return;
  const c={id:"c"+Date.now(),author:ME,text:txt,time:new Date().toISOString()};
  try{
    await apiFetch("POST","/workorders/"+id+"/comments",{author:ME,text:txt});
    WOs=await apiFetch("GET","/workorders");
  } catch{
    (w.comments=w.comments||[]).push(c);
    (w.activity=w.activity||[]).push({text:`${ME} added a comment`,time:new Date().toISOString()});
    w.updatedAt=new Date().toISOString();
    localSave();
  }
  renderList(); renderDetail(id); showToast("Comment posted");
}
