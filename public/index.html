<!-- ===== PART 1 START ===== -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorkOrder Pro</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --success: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --pass: #16a34a;
    --fail: #dc2626;
    --ai: #8b5cf6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea {
    font-family: inherit;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    width: 100%;
  }
  input[type="date"] { color-scheme: dark; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 500;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger); }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: var(--success); }
  .btn-success:hover { background: #16a34a; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 4px;
  }
  .btn-icon:hover { background: var(--panel-2); color: var(--text); }
  .btn-ai {
    background: linear-gradient(135deg, #8b5cf6, #3b82f6);
    color: white;
    border: none;
  }
  .btn-ai:hover { filter: brightness(1.1); }
  .btn-ai:disabled { opacity: 0.6; cursor: not-allowed; }

  /* Login */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  }
  .login-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 360px;
    max-width: 90%;
  }
  .login-card h1 { margin: 0 0 8px; font-size: 24px; }
  .login-card p { margin: 0 0 24px; color: var(--muted); }
  .login-card label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); }
  .login-card .field { margin-bottom: 16px; }
  .login-card .btn { width: 100%; padding: 10px; }
  .login-error { color: var(--danger); margin-top: 12px; font-size: 13px; min-height: 18px; }

  /* App shell */
  #app { display: none; height: 100vh; }
  .app-grid {
    display: grid;
    grid-template-columns: 220px 1fr;
    height: 100%;
  }
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 16px;
  }
  .nav { flex: 1; padding: 8px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted);
    margin-bottom: 2px;
    user-select: none;
  }
  .nav-item:hover { background: var(--panel-2); color: var(--text); }
  .nav-item.active { background: var(--accent); color: white; }
  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .main {
    overflow-y: auto;
    padding: 24px;
  }
  .view-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .view-header h2 { margin: 0; font-size: 22px; }

  /* Cards / lists */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card-title {
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .card-meta { color: var(--muted); font-size: 12px; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
  }
  .badge-open { background: #1e40af; color: #dbeafe; }
  .badge-in_progress { background: #92400e; color: #fef3c7; }
  .badge-complete { background: #166534; color: #dcfce7; }
  .badge-low { background: #475569; color: #e2e8f0; }
  .badge-medium { background: #1e40af; color: #dbeafe; }
  .badge-high { background: #92400e; color: #fef3c7; }
  .badge-urgent { background: #991b1b; color: #fee2e2; }
  .empty {
    text-align: center;
    padding: 48px 16px;
    color: var(--muted);
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-lg { max-width: 900px; }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { margin: 0; font-size: 18px; }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .field-row { margin-bottom: 14px; }
  .field-row label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); }
  .field-row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Procedure builder */
  .pb-field-row {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 130px 1fr auto auto;
    gap: 8px;
    align-items: center;
  }
  .pb-field-row select, .pb-field-row input { padding: 6px 8px; font-size: 13px; }
  .pb-reorder { display: flex; flex-direction: column; gap: 2px; }
  .pb-reorder button { padding: 1px 6px; font-size: 10px; }

  /* Attached procedure on WO */
  .proc-instance {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .proc-instance-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 8px;
  }
  .proc-instance-head strong { font-size: 15px; }
  .proc-field {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 8px 0;
    border-top: 1px solid var(--border);
  }
  .proc-field:first-of-type { border-top: none; }
  .proc-field-label { font-size: 13px; }
  .proc-field-label .req { color: var(--danger); margin-left: 4px; }
  .proc-field-input { min-width: 180px; display: flex; gap: 6px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
  .proc-field-input input[type="text"], .proc-field-input input[type="number"], .proc-field-input input[type="date"] { width: 200px; }
  .pf-btn {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 12px;
  }
  .pf-btn.pass.active { background: var(--pass); border-color: var(--pass); color: white; }
  .pf-btn.fail.active { background: var(--fail); border-color: var(--fail); color: white; }

  .sig-wrap { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .sig-canvas { background: white; border: 1px solid var(--border); border-radius: 6px; width: 280px; height: 110px; touch-action: none; cursor: crosshair; display: block; }
  .sig-saved { background: white; border: 1px solid var(--border); border-radius: 6px; max-width: 280px; max-height: 110px; display: block; }
  .sig-row { display: flex; gap: 6px; align-items: center; }
  .photo-wrap { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .photo-thumb { max-width: 200px; max-height: 150px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; display: block; }
  .photo-row { display: flex; gap: 6px; align-items: center; }
  .photo-status { font-size: 11px; color: var(--muted); }

  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 200; cursor: zoom-out; padding: 20px; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 4px; }

  .activity-log { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 14px; }
  .activity-item { display: flex; gap: 10px; font-size: 12px; color: var(--muted); padding: 4px 0; }
  .activity-time { white-space: nowrap; }

  .ai-panel { background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(59,130,246,0.12)); border: 1px solid #6366f1; border-radius: 8px; padding: 12px; margin-bottom: 16px; }
  .ai-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: 600; font-size: 13px; }
  .ai-panel textarea { min-height: 70px; resize: vertical; }
  .ai-panel-actions { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }
  .ai-status { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 16px; }

  /* ============ AI ASSISTANT CHAT PANEL ============ */
  .chat-fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8b5cf6, #3b82f6);
    color: white;
    border: none;
    font-size: 24px;
    box-shadow: 0 4px 16px rgba(139, 92, 246, 0.5);
    z-index: 90;
    display: none;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
  }
  .chat-fab:hover { transform: scale(1.05); filter: brightness(1.1); }
  #app.show-fab .chat-fab { display: flex; }

  .chat-panel {
    position: fixed;
    right: -440px;
    top: 0;
    bottom: 0;
    width: 420px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 110;
    transition: right 0.25s ease;
    box-shadow: -8px 0 32px rgba(0,0,0,0.4);
  }
  .chat-panel.open { right: 0; }
  .chat-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.15));
  }
  .chat-header h3 { margin: 0; font-size: 16px; display: flex; align-items: center; gap: 6px; }
  .chat-header-actions { display: flex; gap: 4px; }
  .chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chat-msg { max-width: 95%; }
  .chat-msg-user { align-self: flex-end; }
  .chat-msg-assistant { align-self: flex-start; }
  .chat-bubble {
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .chat-msg-user .chat-bubble {
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .chat-msg-assistant .chat-bubble {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .chat-tool-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(139, 92, 246, 0.15);
    border: 1px solid rgba(139, 92, 246, 0.4);
    border-radius: 12px;
    padding: 3px 10px;
    font-size: 11px;
    color: #c4b5fd;
    margin: 2px 0;
  }
  .chat-tool-pill.error { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #fca5a5; }

  .chat-confirm-card {
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.5);
    border-radius: 8px;
    padding: 10px 12px;
    margin: 4px 0;
    font-size: 12px;
  }
  .chat-confirm-card .ccc-title { font-weight: 600; color: var(--warn); margin-bottom: 4px; }
  .chat-confirm-card .ccc-detail { color: var(--muted); margin-bottom: 8px; word-break: break-all; }
  .chat-confirm-card .ccc-actions { display: flex; gap: 6px; }

  .chat-typing {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
  }
  .chat-typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: typing 1.2s infinite;
  }
  .chat-typing span:nth-child(2) { animation-delay: 0.2s; }
  .chat-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; }
    30% { opacity: 1; }
  }

  .chat-empty {
    color: var(--muted);
    text-align: center;
    padding: 24px 12px;
    font-size: 13px;
  }
  .chat-suggestion {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-top: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .chat-suggestion:hover { background: var(--border); }

  .chat-input-bar {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .chat-input-bar textarea {
    resize: none;
    min-height: 40px;
    max-height: 120px;
    flex: 1;
  }
  .chat-error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
  }

  /* Mobile */
  @media (max-width: 720px) {
    .app-grid { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      left: -240px;
      top: 0;
      bottom: 0;
      width: 220px;
      z-index: 50;
      transition: left 0.2s;
    }
    .sidebar.open { left: 0; }
    .mobile-menu-btn { display: inline-flex !important; }
    .field-row-2col { grid-template-columns: 1fr; }
    .pb-field-row { grid-template-columns: 1fr; }
    .proc-field { grid-template-columns: 1fr; }
    .proc-field-input { justify-content: flex-start; }
    .sig-wrap, .photo-wrap { align-items: flex-start; }
    .chat-panel { width: 100%; right: -100%; }
    .chat-fab { right: 16px; bottom: 16px; }
  }
  .mobile-menu-btn {
    display: none;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 22px;
    margin-right: 10px;
  }
</style>
</head>
<body>
<!-- ===== PART 1 END ===== -->
<!-- ===== PART 2A START ===== -->

<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen">
  <div class="login-card">
    <h1>WorkOrder Pro</h1>
    <p>Sign in to continue</p>
    <div class="field">
      <label for="login-user">Username</label>
      <input id="login-user" type="text" autocomplete="username" />
    </div>
    <div class="field">
      <label for="login-pass">Password</label>
      <input id="login-pass" type="password" autocomplete="current-password" />
    </div>
    <button class="btn" id="login-btn">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app">
  <div class="app-grid">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">WorkOrder Pro</div>
      <nav class="nav">
        <div class="nav-item active" data-view="workorders">
          <span>📋</span><span>Work Orders</span>
        </div>
        <div class="nav-item" data-view="procedures">
          <span>📝</span><span>Procedures</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <span id="current-user">—</span>
        <button class="btn-icon" id="logout-btn" title="Sign out">⎋</button>
      </div>
    </aside>

    <main class="main">
      <section id="view-workorders">
        <div class="view-header">
          <div style="display:flex; align-items:center;">
            <button class="mobile-menu-btn" id="menu-btn">☰</button>
            <h2>Work Orders</h2>
          </div>
          <button class="btn" id="new-wo-btn">+ New Work Order</button>
        </div>
        <div id="wo-list" class="card-grid"></div>
      </section>

      <section id="view-procedures" style="display:none;">
        <div class="view-header">
          <div style="display:flex; align-items:center;">
            <button class="mobile-menu-btn" id="menu-btn-2">☰</button>
            <h2>Procedures</h2>
          </div>
          <button class="btn" id="new-proc-btn">+ New Procedure</button>
        </div>
        <div id="proc-list" class="card-grid"></div>
      </section>
    </main>
  </div>

  <!-- Floating chat button -->
  <button class="chat-fab" id="chat-fab" title="AI Assistant">✨</button>
</div>

<!-- ============ MODAL: NEW / EDIT WORK ORDER ============ -->
<div class="modal-backdrop" id="wo-form-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="wo-form-title">New Work Order</h3>
      <button class="btn-icon" data-close="wo-form-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <label>Title</label>
        <input id="wof-title" type="text" />
      </div>
      <div class="field-row">
        <label>Description</label>
        <textarea id="wof-desc" rows="3"></textarea>
      </div>
      <div class="field-row field-row-2col">
        <div>
          <label>Status</label>
          <select id="wof-status">
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="complete">Complete</option>
          </select>
        </div>
        <div>
          <label>Priority</label>
          <select id="wof-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <label>Assignee</label>
        <input id="wof-assignee" type="text" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="wo-form-modal">Cancel</button>
      <button class="btn" id="wof-save">Save</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: WORK ORDER DETAIL ============ -->
<div class="modal-backdrop" id="wo-detail-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="wod-title">Work Order</h3>
      <button class="btn-icon" data-close="wo-detail-modal">✕</button>
    </div>
    <div class="modal-body" id="wod-body"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="wod-delete">Delete</button>
      <button class="btn btn-secondary" data-close="wo-detail-modal">Close</button>
      <button class="btn" id="wod-edit">Edit</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: PROCEDURE BUILDER ============ -->
<div class="modal-backdrop" id="proc-builder-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="pb-title">New Procedure</h3>
      <button class="btn-icon" data-close="proc-builder-modal">✕</button>
    </div>
    <div class="modal-body">
      <div id="ai-panel-wrap" style="display:none;">
        <div class="ai-panel">

<!-- ===== PART A2 START ===== -->
<script>
(() => {
  // ===== Auth (client-side only, demo) =====
  const USERS = { bill: 'bill', serina: 'serina' };
  const SESSION_KEY = 'wopro_user';
  const getCurrentUser = () => sessionStorage.getItem(SESSION_KEY);
  const setCurrentUser = (u) => sessionStorage.setItem(SESSION_KEY, u);
  const clearCurrentUser = () => sessionStorage.removeItem(SESSION_KEY);

  // ===== API client =====
  async function apiFetch(path, opts = {}) {
    const res = await fetch(path, {
      headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
      ...opts,
    });
    const text = await res.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
    if (!res.ok) {
      const msg = (data && (data.error || data.message)) || `HTTP ${res.status}`;
      throw new Error(msg);
    }
    return data;
  }

  // ===== State =====
  const state = {
    view: 'workorders',
    workorders: [],
    procedures: [],
    activeWO: null,
    editingWoId: null,     // null = new; id = editing existing
    editingProc: null,
    pbFields: [],
  };

  // ===== Helpers =====
  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
  function el(tag, attrs = {}, ...children) {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs || {})) {
      if (k === 'class') node.className = v;
      else if (k === 'dataset') Object.assign(node.dataset, v);
      else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
      else if (v === true) node.setAttribute(k, '');
      else if (v === false || v == null) {}
      else node.setAttribute(k, v);
    }
    for (const c of children.flat()) {
      if (c == null || c === false) continue;
      node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return node;
  }
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const fmtDate = (iso) => { if (!iso) return ''; try { return new Date(iso).toLocaleString(); } catch { return iso; } };

  // ===== Modal helpers (.modal-backdrop + .show) =====
  function openModal(id) { const m = document.getElementById(id); if (m) m.classList.add('show'); }
  function closeModal(id) { const m = document.getElementById(id); if (m) m.classList.remove('show'); }
  // Click-outside and data-close handlers
  document.addEventListener('click', (e) => {
    // Click directly on backdrop closes
    if (e.target.classList && e.target.classList.contains('modal-backdrop')) {
      e.target.classList.remove('show');
    }
    // data-close="MODAL_ID" buttons
    const closeId = e.target.getAttribute && e.target.getAttribute('data-close');
    if (closeId) closeModal(closeId);
  });

  // ===== Lightbox =====
  function openLightbox(src) {
    const lb = $('#lightbox');
    if (!lb) return;
    $('#lightbox-img').src = src;
    lb.classList.add('show');
  }
  if ($('#lightbox')) $('#lightbox').addEventListener('click', () => $('#lightbox').classList.remove('show'));

  // ===== Login (button click) =====
  function attemptLogin() {
    const u = $('#login-user').value.trim().toLowerCase();
    const p = $('#login-pass').value;
    if (USERS[u] && USERS[u] === p) {
      setCurrentUser(u);
      $('#login-error').textContent = '';
      showApp();
    } else {
      $('#login-error').textContent = 'Invalid username or password';
    }
  }
  $('#login-btn').addEventListener('click', (e) => { e.preventDefault(); attemptLogin(); });
  // Allow Enter key in either input to submit
  ['#login-user', '#login-pass'].forEach(sel => {
    $(sel).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); attemptLogin(); }
    });
  });
  $('#logout-btn').addEventListener('click', () => { clearCurrentUser(); showLogin(); });

  function showLogin() {
    $('#login-screen').style.display = 'flex';
    $('#app').style.display = 'none';
    $('#login-user').value = '';
    $('#login-pass').value = '';
  }
  function showApp() {
    $('#login-screen').style.display = 'none';
    $('#app').style.display = 'block';
    $('#app').classList.add('show-fab');
    $('#current-user').textContent = getCurrentUser();
    setView(state.view);
    refreshAll();
  }

  // ===== View switching (.nav-item[data-view]) =====
  $$('.nav-item').forEach(n => n.addEventListener('click', () => {
    const v = n.dataset.view;
    if (v) setView(v);
  }));
  function setView(v) {
    state.view = v;
    $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === v));
    $('#view-workorders').style.display = v === 'workorders' ? '' : 'none';
    $('#view-procedures').style.display = v === 'procedures' ? '' : 'none';
    if (v === 'workorders') renderWorkOrders();
    else renderProcedures();
    // Close mobile sidebar after navigation
    $('#sidebar').classList.remove('open');
  }

  // Mobile menu (two buttons)
  ['#menu-btn', '#menu-btn-2'].forEach(sel => {
    const b = $(sel);
    if (b) b.addEventListener('click', () => $('#sidebar').classList.toggle('open'));
  });

  async function refreshAll() {
    try {
      const [wos, procs] = await Promise.all([
        apiFetch('/api/workorders'),
        apiFetch('/api/procedures'),
      ]);
      state.workorders = wos || [];
      state.procedures = procs || [];
      if (state.view === 'workorders') renderWorkOrders();
      else renderProcedures();
      if (state.activeWO) {
        const fresh = state.workorders.find(w => w.id === state.activeWO.id);
        if (fresh) { state.activeWO = fresh; renderWorkOrderDetail(); }
      }
    } catch (e) {
      console.error('refreshAll', e);
    }
  }
  // Expose for chat panel auto-refresh
  window.__wopro_refresh = refreshAll;
<!-- ===== PART A2 END ===== -->
<!-- ===== PART B2 START ===== -->
  // ===== Work Orders list =====
  function renderWorkOrders() {
    const list = $('#wo-list');
    list.innerHTML = '';
    if (!state.workorders.length) {
      list.appendChild(el('div', { class: 'empty' }, 'No work orders yet. Click "+ New Work Order" to create one.'));
      return;
    }
    state.workorders.forEach(w => {
      const card = el('div', { class: 'card wo-card', onclick: () => openWorkOrder(w.id) },
        el('div', { class: 'wo-card-header' },
          el('div', { class: 'wo-title' }, w.title || '(untitled)'),
          el('span', { class: `pill priority-${w.priority || 'medium'}` }, w.priority || 'medium'),
        ),
        el('div', { class: 'wo-meta' },
          el('span', {}, `Status: ${w.status || 'open'}`),
          el('span', {}, `Assignee: ${w.assignee || '—'}`),
          el('span', {}, `Created: ${fmtDate(w.createdAt)}`),
        ),
        w.description ? el('div', { class: 'wo-desc' }, w.description) : null,
      );
      list.appendChild(card);
    });
  }

  // ===== WO form (no <form>, button-driven) =====
  function openWoForm(wo) {
    state.editingWoId = wo ? wo.id : null;
    $('#wo-form-title').textContent = wo ? 'Edit Work Order' : 'New Work Order';
    $('#wof-title').value = wo ? (wo.title || '') : '';
    $('#wof-desc').value = wo ? (wo.description || '') : '';
    $('#wof-status').value = wo ? (wo.status || 'open') : 'open';
    $('#wof-priority').value = wo ? (wo.priority || 'medium') : 'medium';
    $('#wof-assignee').value = wo ? (wo.assignee || '') : '';
    openModal('wo-form-modal');
    setTimeout(() => $('#wof-title').focus(), 50);
  }

  $('#new-wo-btn').addEventListener('click', () => openWoForm(null));

  $('#wof-save').addEventListener('click', async () => {
    const payload = {
      title: $('#wof-title').value.trim(),
      description: $('#wof-desc').value.trim(),
      status: $('#wof-status').value,
      priority: $('#wof-priority').value,
      assignee: $('#wof-assignee').value.trim(),
    };
    if (!payload.title) { alert('Title is required'); return; }
    try {
      if (state.editingWoId) {
        await apiFetch(`/api/workorders/${state.editingWoId}`, { method: 'PUT', body: JSON.stringify(payload) });
      } else {
        await apiFetch('/api/workorders', { method: 'POST', body: JSON.stringify(payload) });
      }
      closeModal('wo-form-modal');
      state.editingWoId = null;
      await refreshAll();
    } catch (err) {
      alert('Save failed: ' + err.message);
    }
  });

  // ===== WO detail =====
  async function openWorkOrder(id) {
    try {
      const wo = await apiFetch(`/api/workorders/${id}`);
      state.activeWO = wo;
      renderWorkOrderDetail();
      openModal('wo-detail-modal');
    } catch (e) { alert('Open failed: ' + e.message); }
  }

  function renderWorkOrderDetail() {
    const wo = state.activeWO;
    if (!wo) return;
    $('#wod-title').textContent = wo.title || '(untitled)';
    const body = $('#wod-body');
    body.innerHTML = '';
    body.appendChild(el('div', { class: 'wo-meta' },
      el('span', { class: `pill priority-${wo.priority || 'medium'}` }, wo.priority || 'medium'),
      el('span', {}, `Status: ${wo.status || 'open'}`),
      el('span', {}, `Assignee: ${wo.assignee || '—'}`),
      el('span', {}, `Created: ${fmtDate(wo.createdAt)}`),
    ));
    if (wo.description) body.appendChild(el('p', { class: 'wo-desc' }, wo.description));

    body.appendChild(el('div', { class: 'detail-actions' },
      el('button', { class: 'btn btn-secondary btn-sm', onclick: () => openAttachModal(wo.id) }, '+ Attach Procedure'),
    ));

    const procWrap = el('div', { class: 'attached-procs' });
    body.appendChild(procWrap);
    const attached = wo.procedures || [];
    if (!attached.length) {
      procWrap.appendChild(el('div', { class: 'empty' }, 'No procedures attached.'));
    } else {
      attached.forEach(inst => procWrap.appendChild(renderProcedureInstance(wo, inst)));
    }
  }

  // Footer Edit / Delete buttons (wired once, read state.activeWO each click)
  $('#wod-edit').addEventListener('click', () => {
    if (!state.activeWO) return;
    const wo = state.activeWO;
    closeModal('wo-detail-modal');
    openWoForm(wo);
  });
  $('#wod-delete').addEventListener('click', async () => {
    if (!state.activeWO) return;
    const wo = state.activeWO;
    if (!confirm(`Delete work order "${wo.title}"?`)) return;
    try {
      await apiFetch(`/api/workorders/${wo.id}`, { method: 'DELETE' });
      state.activeWO = null;
      closeModal('wo-detail-modal');
      await refreshAll();
    } catch (err) { alert('Delete failed: ' + err.message); }
  });

  // ===== Procedures list =====
  function renderProcedures() {
    const list = $('#proc-list');
    list.innerHTML = '';
    if (!state.procedures.length) {
      list.appendChild(el('div', { class: 'empty' }, 'No procedures yet. Click "+ New Procedure" to build one.'));
      return;
    }
    state.procedures.forEach(p => {
      const card = el('div', { class: 'card proc-card' },
        el('div', { class: 'proc-card-header' },
          el('div', { class: 'proc-title' }, p.name || '(untitled)'),
          el('span', { class: 'pill' }, `${(p.fields || []).length} fields`),
        ),
        p.description ? el('div', { class: 'proc-desc' }, p.description) : null,
        el('div', { class: 'card-actions' },
          el('button', { class: 'btn btn-secondary btn-sm', onclick: (ev) => { ev.stopPropagation(); openProcedureBuilder(p); } }, 'Edit'),
          el('button', { class: 'btn btn-danger btn-sm', onclick: async (ev) => {
            ev.stopPropagation();
            if (!confirm(`Delete procedure "${p.name}"? This cannot be undone.`)) return;
            try { await apiFetch(`/api/procedures/${p.id}`, { method: 'DELETE' }); await refreshAll(); }
            catch (err) { alert('Delete failed: ' + err.message); }
          }}, 'Delete'),
        ),
      );
      list.appendChild(card);
    });
  }
  $('#new-proc-btn').addEventListener('click', () => openProcedureBuilder(null));

  // ===== Image resize =====
  function resizeImage(file, maxDim = 1280, quality = 0.7) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('Read failed'));
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => reject(new Error('Image load failed'));
        img.onload = () => {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            const scale = Math.min(maxDim / width, maxDim / height);
            width = Math.round(width * scale);
            height = Math.round(height * scale);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ===== Signature pad =====
  function makeSignaturePad(canvas) {
    const ctx = canvas.getContext('2d');
    let drawing = false, last = null;
    function pos(ev) {
      const r = canvas.getBoundingClientRect();
      const t = ev.touches ? ev.touches[0] : ev;
      return { x: (t.clientX - r.left) * (canvas.width / r.width), y: (t.clientY - r.top) * (canvas.height / r.height) };
    }
    function start(ev) { ev.preventDefault(); drawing = true; last = pos(ev); }
    function move(ev) {
      if (!drawing) return;
      ev.preventDefault();
      const p = pos(ev);
      ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(p.x, p.y); ctx.stroke();
      last = p;
    }
    function end() {
      if (!drawing) return;
      drawing = false;
      canvas.dispatchEvent(new CustomEvent('sig-change', { detail: canvas.toDataURL('image/png') }));
    }
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);
    return {
      clear() { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.dispatchEvent(new CustomEvent('sig-change', { detail: '' })); },
      load(dataUrl) {
        if (!dataUrl) return;
        const img = new Image();
        img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width,canvas.height); };
        img.src = dataUrl;
      }
    };
  }
<!-- ===== PART B2 END ===== -->
<!-- ===== PART C2 START ===== -->
  // ===== Procedure instance renderer =====
  function renderProcedureInstance(wo, inst) {
    const proc = state.procedures.find(p => p.id === inst.procedureId);
    const wrap = el('div', { class: 'proc-instance card' });
    wrap.appendChild(el('div', { class: 'proc-instance-header' },
      el('div', { class: 'proc-title' }, proc ? proc.name : '(deleted procedure)'),
      el('div', { class: 'proc-instance-actions' },
        el('button', { class: 'btn btn-secondary btn-sm', onclick: async () => {
          try { await apiFetch(`/api/workorders/${wo.id}/procedures/${inst.id}/complete`, { method: 'POST' }); await refreshAll(); }
          catch (e) { alert('Mark complete failed: ' + e.message); }
        }}, inst.completedAt ? `✓ Completed ${fmtDate(inst.completedAt)}` : 'Mark Complete'),
        el('button', { class: 'btn btn-danger btn-sm', onclick: async () => {
          if (!confirm('Detach this procedure?')) return;
          try { await apiFetch(`/api/workorders/${wo.id}/procedures/${inst.id}`, { method: 'DELETE' }); await refreshAll(); }
          catch (e) { alert('Detach failed: ' + e.message); }
        }}, 'Detach'),
      ),
    ));
    if (!proc) return wrap;
    const fieldsWrap = el('div', { class: 'proc-fields' });
    wrap.appendChild(fieldsWrap);
    (proc.fields || []).forEach(f => {
      const current = (inst.responses || {})[f.id];
      const row = el('div', { class: 'field-row' });
      row.appendChild(el('label', { class: 'field-label' }, f.label || '(unlabeled)', f.required ? el('span', { class: 'req' }, ' *') : null));
      const save = (val) => queueResponseSave(wo.id, inst.id, f.id, val);
      if (f.type === 'checkbox') {
        const cb = el('input', { type: 'checkbox' });
        cb.checked = !!current;
        cb.addEventListener('change', () => save(cb.checked));
        row.appendChild(cb);
      } else if (f.type === 'text') {
        const inp = el('input', { type: 'text' });
        inp.value = current || '';
        inp.addEventListener('input', () => save(inp.value));
        row.appendChild(inp);
      } else if (f.type === 'number') {
        const inp = el('input', { type: 'number' });
        if (current != null) inp.value = current;
        inp.addEventListener('input', () => save(inp.value === '' ? null : Number(inp.value)));
        row.appendChild(inp);
      } else if (f.type === 'passfail') {
        const group = el('div', { class: 'pf-group' });
        ['pass', 'fail', 'n/a'].forEach(opt => {
          const id = `pf-${inst.id}-${f.id}-${opt}`;
          const r = el('input', { type: 'radio', name: `pf-${inst.id}-${f.id}`, id, value: opt });
          if (current === opt) r.checked = true;
          r.addEventListener('change', () => save(opt));
          group.appendChild(r);
          group.appendChild(el('label', { for: id, class: `pf-${opt.replace('/','')}` }, opt.toUpperCase()));
        });
        row.appendChild(group);
      } else if (f.type === 'date') {
        const inp = el('input', { type: 'date' });
        inp.value = current || '';
        inp.addEventListener('input', () => save(inp.value || null));
        row.appendChild(inp);
      } else if (f.type === 'signature') {
        const canvas = el('canvas', { class: 'sig-pad', width: 600, height: 180 });
        const pad = makeSignaturePad(canvas);
        if (current) pad.load(current);
        canvas.addEventListener('sig-change', (e) => save(e.detail));
        const clearBtn = el('button', { class: 'btn btn-secondary btn-sm', type: 'button', onclick: () => pad.clear() }, 'Clear');
        row.appendChild(el('div', { class: 'sig-wrap' }, canvas, clearBtn));
      } else if (f.type === 'photo') {
        const wrapPhoto = el('div', { class: 'photo-wrap' });
        const preview = el('div', { class: 'photo-preview' });
        if (current) {
          const img = el('img', { src: current, alt: 'photo' });
          img.addEventListener('click', () => openLightbox(current));
          preview.appendChild(img);
        }
        const fileInp = el('input', { type: 'file', accept: 'image/*', capture: 'environment' });
        const status = el('span', { class: 'photo-status' });
        fileInp.addEventListener('change', async () => {
          const file = fileInp.files[0]; if (!file) return;
          status.textContent = 'Resizing…';
          try {
            const dataUrl = await resizeImage(file);
            preview.innerHTML = '';
            const img = el('img', { src: dataUrl, alt: 'photo' });
            img.addEventListener('click', () => openLightbox(dataUrl));
            preview.appendChild(img);
            save(dataUrl);
            status.textContent = 'Saved';
            setTimeout(() => status.textContent = '', 1500);
          } catch (e) { status.textContent = 'Error: ' + e.message; }
        });
        const clearBtn = el('button', { class: 'btn btn-secondary btn-sm', type: 'button', onclick: () => {
          preview.innerHTML = ''; fileInp.value = ''; save(null);
        }}, 'Clear');
        wrapPhoto.appendChild(preview);
        wrapPhoto.appendChild(el('div', { class: 'photo-actions' }, fileInp, clearBtn, status));
        row.appendChild(wrapPhoto);
      }
      fieldsWrap.appendChild(row);
    });
    return wrap;
  }

  // Debounced response save
  const _saveTimers = new Map();
  function queueResponseSave(woId, instId, fieldId, value) {
    const key = `${woId}:${instId}:${fieldId}`;
    if (_saveTimers.has(key)) clearTimeout(_saveTimers.get(key));
    _saveTimers.set(key, setTimeout(() => saveResponseNow(woId, instId, fieldId, value), 400));
  }
  async function saveResponseNow(woId, instId, fieldId, value) {
    try {
      await apiFetch(`/api/workorders/${woId}/procedures/${instId}/responses`, {
        method: 'PATCH', body: JSON.stringify({ [fieldId]: value }),
      });
      const wo = state.workorders.find(w => w.id === woId);
      if (wo) {
        const inst = (wo.procedures || []).find(p => p.id === instId);
        if (inst) { inst.responses = inst.responses || {}; inst.responses[fieldId] = value; }
      }
      if (state.activeWO && state.activeWO.id === woId) {
        const inst = (state.activeWO.procedures || []).find(p => p.id === instId);
        if (inst) { inst.responses = inst.responses || {}; inst.responses[fieldId] = value; }
      }
    } catch (e) { console.error('saveResponse', e); }
  }

  // ===== Attach modal =====
  function openAttachModal(woId) {
    const list = $('#attach-body');
    list.innerHTML = '';
    if (!state.procedures.length) {
      list.appendChild(el('div', { class: 'empty' }, 'No procedures available. Build one first.'));
    } else {
      state.procedures.forEach(p => {
        list.appendChild(el('div', { class: 'attach-item' },
          el('div', {},
            el('div', { class: 'proc-title' }, p.name),
            el('div', { class: 'proc-desc small' }, `${(p.fields || []).length} fields`),
          ),
          el('button', { class: 'btn btn-sm', onclick: async () => {
            try {
              await apiFetch(`/api/workorders/${woId}/procedures`, {
                method: 'POST', body: JSON.stringify({ procedureId: p.id }),
              });
              closeModal('attach-modal');
              await refreshAll();
            } catch (e) { alert('Attach failed: ' + e.message); }
          }}, 'Attach'),
        ));
      });
    }
    openModal('attach-modal');
  }

  // ===== Procedure builder =====
  const FIELD_TYPE_OPTIONS = [
    { value: 'checkbox', label: 'Checkbox' },
    { value: 'text', label: 'Text' },
    { value: 'number', label: 'Number' },
    { value: 'passfail', label: 'Pass / Fail' },
    { value: 'date', label: 'Date' },
    { value: 'signature', label: 'Signature' },
    { value: 'photo', label: 'Photo' },
  ];

  function openProcedureBuilder(proc) {
    state.editingProc = proc;
    state.pbFields = proc ? JSON.parse(JSON.stringify(proc.fields || [])) : [];
    $('#pb-title').textContent = proc ? 'Edit Procedure' : 'New Procedure';
    $('#pb-name').value = proc ? (proc.name || '') : '';
    $('#pb-desc').value = proc ? (proc.description || '') : '';
    $('#pb-delete').style.display = proc ? '' : 'none';
    $('#ai-panel-wrap').style.display = 'none';
    $('#ai-prompt').value = '';
    $('#ai-status').textContent = '';
    renderPBFields();
    openModal('proc-builder-modal');
  }

  function renderPBFields() {
    const wrap = $('#pb-fields');
    wrap.innerHTML = '';
    if (!state.pbFields.length) {
      wrap.appendChild(el('div', { class: 'empty' }, 'No fields. Click "+ Add Field" or use AI to generate.'));
      return;
    }
    state.pbFields.forEach((f, idx) => {
      const row = el('div', { class: 'pb-field' });
      const labelInp = el('input', { type: 'text', placeholder: 'Field label' });
      labelInp.value = f.label || '';
      labelInp.addEventListener('input', () => { f.label = labelInp.value; });
      const typeSel = el('select', {},
        ...FIELD_TYPE_OPTIONS.map(o => {
          const opt = el('option', { value: o.value }, o.label);
          if (o.value === f.type) opt.selected = true;
          return opt;
        })
      );
      typeSel.addEventListener('change', () => { f.type = typeSel.value; });
      const reqLbl = el('label', { class: 'pb-req' });
      const reqCb = el('input', { type: 'checkbox' });
      reqCb.checked = !!f.required;
      reqCb.addEventListener('change', () => { f.required = reqCb.checked; });
      reqLbl.appendChild(reqCb);
      reqLbl.appendChild(document.createTextNode(' Required'));
      const upBtn = el('button', { class: 'btn btn-secondary btn-sm', type: 'button', onclick: () => moveField(idx, -1) }, '↑');
      const downBtn = el('button', { class: 'btn btn-secondary btn-sm', type: 'button', onclick: () => moveField(idx, 1) }, '↓');
      const delBtn = el('button', { class: 'btn btn-danger btn-sm', type: 'button', onclick: () => {
        state.pbFields.splice(idx, 1); renderPBFields();
      }}, '✕');
      row.appendChild(labelInp); row.appendChild(typeSel); row.appendChild(reqLbl);
      row.appendChild(upBtn); row.appendChild(downBtn); row.appendChild(delBtn);
      wrap.appendChild(row);
    });
  }

  function moveField(idx, delta) {
    const ni = idx + delta;
    if (ni < 0 || ni >= state.pbFields.length) return;
    const tmp = state.pbFields[idx];
    state.pbFields[idx] = state.pbFields[ni];
    state.pbFields[ni] = tmp;
    renderPBFields();
  }

  $('#pb-add-field').addEventListener('click', () => {
    state.pbFields.push({ id: 'f_' + Math.random().toString(36).slice(2, 9), label: '', type: 'checkbox', required: false });
    renderPBFields();
  });

  $('#pb-save').addEventListener('click', async () => {
    const name = $('#pb-name').value.trim();
    if (!name) { alert('Procedure name is required'); return; }
    const description = $('#pb-desc').value.trim();
    const fields = state.pbFields.filter(f => (f.label || '').trim()).map(f => ({
      id: f.id || ('f_' + Math.random().toString(36).slice(2, 9)),
      label: f.label.trim(),
      type: f.type || 'checkbox',
      required: !!f.required,
    }));
    const payload = { name, description, fields };
    try {
      if (state.editingProc) {
        await apiFetch(`/api/procedures/${state.editingProc.id}`, { method: 'PUT', body: JSON.stringify(payload) });
      } else {
        await apiFetch('/api/procedures', { method: 'POST', body: JSON.stringify(payload) });
      }
      closeModal('proc-builder-modal');
      await refreshAll();
    } catch (e) { alert('Save failed: ' + e.message); }
  });

  $('#pb-delete').addEventListener('click', async () => {
    if (!state.editingProc) return;
    if (!confirm(`Delete procedure "${state.editingProc.name}"?`)) return;
    try {
      await apiFetch(`/api/procedures/${state.editingProc.id}`, { method: 'DELETE' });
      closeModal('proc-builder-modal');
      await refreshAll();
    } catch (e) { alert('Delete failed: ' + e.message); }
  });

  // ===== AI procedure generator =====
  $('#ai-show').addEventListener('click', () => {
    $('#ai-panel-wrap').style.display = 'block';
    $('#ai-prompt').focus();
  });
  $('#ai-cancel').addEventListener('click', () => {
    $('#ai-panel-wrap').style.display = 'none';
    $('#ai-status').textContent = '';
  });
  $('#ai-generate').addEventListener('click', async () => {
    const prompt = $('#ai-prompt').value.trim();
    if (!prompt) { $('#ai-status').textContent = 'Please describe the procedure first.'; return; }
    $('#ai-status').textContent = 'Generating…';
    $('#ai-generate').disabled = true;
    try {
      const result = await apiFetch('/api/procedures/generate', {
        method: 'POST', body: JSON.stringify({ prompt }),
      });
      if (result.name && !$('#pb-name').value.trim()) $('#pb-name').value = result.name;
      if (result.description && !$('#pb-desc').value.trim()) $('#pb-desc').value = result.description;
      if (Array.isArray(result.fields)) {
        state.pbFields = result.fields.map(f => ({
          id: 'f_' + Math.random().toString(36).slice(2, 9),
          label: f.label || '',
          type: f.type || 'checkbox',
          required: !!f.required,
        }));
        renderPBFields();
      }
      $('#ai-status').textContent = `Added ${result.fields?.length || 0} fields. Review and edit as needed.`;
      $('#ai-panel-wrap').style.display = 'none';
    } catch (e) {
      $('#ai-status').textContent = 'Error: ' + e.message;
    } finally {
      $('#ai-generate').disabled = false;
    }
  });
<!-- ===== PART C2 END ===== -->
<!-- ===== PART D2 START ===== -->
  // ===== AI Assistant Chat Panel =====
  const chatState = {
    messages: [],          // Display messages (for UI rendering)
    apiHistory: [],        // Canonical message history from backend (with tool_use/tool_result blocks)
    busy: false,
  };
  const SUGGESTIONS = [
    'List my work orders',
    'Create a work order: Replace fluorescent bulbs in warehouse, medium priority',
    'List my procedures',
    'How many work orders are open?',
  ];

  function toggleChat(force) {
    const panel = $('#chat-panel');
    const open = force != null ? force : !panel.classList.contains('open');
    panel.classList.toggle('open', open);
    document.body.classList.toggle('chat-open', open);
    if (open) {
      renderChatScroll();
      setTimeout(() => $('#chat-input').focus(), 100);
    }
  }

  $('#chat-fab').addEventListener('click', () => toggleChat());
  $('#chat-close').addEventListener('click', () => toggleChat(false));
  $('#chat-clear').addEventListener('click', () => {
    if (!chatState.messages.length) return;
    if (!confirm('Clear chat history?')) return;
    chatState.messages = [];
    chatState.apiHistory = [];
    renderChatScroll();
  });

  function renderChatScroll() {
    const scroll = $('#chat-scroll');
    scroll.innerHTML = '';
    if (!chatState.messages.length) {
      const empty = el('div', { class: 'chat-empty' },
        el('div', { class: 'chat-empty-title' }, '✨ AI Assistant'),
        el('div', { class: 'chat-empty-sub' }, 'Ask me to create, find, or update work orders and procedures.'),
        el('div', { class: 'chat-suggestions' },
          ...SUGGESTIONS.map(s => el('button', {
            class: 'chat-suggestion',
            type: 'button',
            onclick: () => { $('#chat-input').value = s; sendMessage(); }
          }, s))
        ),
      );
      scroll.appendChild(empty);
      return;
    }
    chatState.messages.forEach(msg => {
      if (msg.role === 'user') {
        scroll.appendChild(el('div', { class: 'chat-msg chat-msg-user' },
          el('div', { class: 'chat-bubble chat-bubble-user' }, msg.content)
        ));
      } else if (msg.role === 'assistant') {
        const wrap = el('div', { class: 'chat-msg chat-msg-assistant' });
        if (msg.content) {
          wrap.appendChild(el('div', { class: 'chat-bubble chat-bubble-assistant' }, msg.content));
        }
        if (Array.isArray(msg.toolCalls)) {
          msg.toolCalls.forEach(tc => {
            const status = tc.status || 'done';
            wrap.appendChild(el('div', { class: `chat-tool-pill chat-tool-${status}` },
              el('span', { class: 'chat-tool-icon' }, status === 'cancelled' ? '✕' : '⚙'),
              el('span', { class: 'chat-tool-name' }, tc.name),
              tc.summary ? el('span', { class: 'chat-tool-summary' }, tc.summary) : null,
            ));
          });
        }
        if (Array.isArray(msg.pendingConfirmations)) {
          msg.pendingConfirmations.forEach(pc => {
            wrap.appendChild(renderConfirmationCard(pc));
          });
        }
        scroll.appendChild(wrap);
      }
    });
    if (chatState.busy) {
      scroll.appendChild(el('div', { class: 'chat-msg chat-msg-assistant' },
        el('div', { class: 'chat-typing' },
          el('span', { class: 'dot' }), el('span', { class: 'dot' }), el('span', { class: 'dot' }),
        )
      ));
    }
    scroll.scrollTop = scroll.scrollHeight;
  }

  function friendlySummary(pc) {
    const inp = pc.input || {};
    // Try to look up entity title/name from local state for human-readable summary
    if (inp.id) {
      if (pc.name === 'delete_work_order') {
        const wo = state.workorders.find(w => w.id === inp.id);
        if (wo && wo.title) return `Work order: "${wo.title}"`;
      } else if (pc.name === 'detach_procedure' && inp.workOrderId) {
        const wo = state.workorders.find(w => w.id === inp.workOrderId);
        if (wo) return `Procedure on work order "${wo.title}"`;
      }
    }
    // Fallback: pretty key:value pairs
    return Object.entries(inp).map(([k, v]) =>
      `${k}: ${typeof v === 'string' ? v : JSON.stringify(v)}`
    ).join('  ·  ');
  }

  const TOOL_LABELS = {
    delete_work_order: 'Delete work order',
    detach_procedure: 'Detach procedure',
  };

  function renderConfirmationCard(pc) {
    const card = el('div', { class: 'chat-confirm-card' });
    card.appendChild(el('div', { class: 'chat-confirm-title' }, '⚠️ Confirm destructive action'));
    card.appendChild(el('div', { class: 'chat-confirm-tool' }, TOOL_LABELS[pc.name] || pc.name));
    const summary = friendlySummary(pc);
    if (summary) card.appendChild(el('div', { class: 'chat-confirm-input' }, summary));
    card.appendChild(el('div', { class: 'chat-confirm-actions' },
      el('button', { class: 'btn btn-danger btn-sm', onclick: () => confirmTool(pc.toolUseId) }, 'Confirm'),
      el('button', { class: 'btn btn-secondary btn-sm', onclick: () => cancelTool(pc.toolUseId) }, 'Cancel'),
    ));
    return card;
  }

  async function sendMessage() {
    if (chatState.busy) return;
    const input = $('#chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    chatState.messages.push({ role: 'user', content: text });
    chatState.busy = true;
    renderChatScroll();
    try {
      await callAssistant({});
    } catch (e) {
      chatState.messages.push({ role: 'assistant', content: 'Error: ' + e.message });
    } finally {
      chatState.busy = false;
      renderChatScroll();
    }
  }

  // Tools that mutate data (auto-trigger UI refresh)
  const MUTATING_TOOLS = new Set([
    'create_work_order','update_work_order','delete_work_order',
    'create_procedure','attach_procedure','detach_procedure','mark_procedure_complete',
  ]);

  async function callAssistant(opts) {
    // Build messages to send: prefer canonical apiHistory; append the latest user message if not already there
    let messagesToSend;
    if (opts && opts.confirmedToolUseIds && chatState.apiHistory.length) {
      // Confirmation: send the full canonical history with tool_use/tool_result blocks
      messagesToSend = chatState.apiHistory;
    } else {
      // New user turn: take canonical history and append the new user message
      const lastUser = [...chatState.messages].reverse().find(m => m.role === 'user');
      messagesToSend = [...chatState.apiHistory];
      if (lastUser) messagesToSend.push({ role: 'user', content: lastUser.content });
    }
    const body = { messages: messagesToSend };
    if (opts && opts.confirmedToolUseIds) body.confirmedToolUseIds = opts.confirmedToolUseIds;
    const result = await apiFetch('/api/assistant', {
      method: 'POST', body: JSON.stringify(body),
    });
    // Save canonical history for next turn
    if (Array.isArray(result.messages)) chatState.apiHistory = result.messages;
    // Map backend fields: assistantText -> content, toolEvents -> toolCalls
    const events = Array.isArray(result.toolEvents) ? result.toolEvents : [];
    const toolCalls = events.map(ev => {
      let summary = '';
      if (Array.isArray(ev.result)) summary = `${ev.result.length} item${ev.result.length === 1 ? '' : 's'}`;
      else if (ev.result && typeof ev.result === 'object') {
        if (ev.result.title) summary = ev.result.title;
        else if (ev.result.name) summary = ev.result.name;
        else if (ev.result.id) summary = ev.result.id.substring(0, 8);
      } else if (typeof ev.result === 'string') summary = ev.result.substring(0, 60);
      return { name: ev.name, summary, status: 'done' };
    });
    let content = result.assistantText || result.reply || '';
    // Suppress the echoed prior assistant text on confirmation replay
    if (opts && opts.suppressContent && content === opts.suppressContent) {
      content = '';
    }
    const assistantMsg = {
      role: 'assistant',
      content,
      toolCalls,
      pendingConfirmations: result.pendingConfirmations || [],
    };
    chatState.messages.push(assistantMsg);
    const dataChanged = events.some(ev => MUTATING_TOOLS.has(ev.name));
    if (dataChanged && typeof window.__wopro_refresh === 'function') {
      window.__wopro_refresh();
    }
  }

  async function confirmTool(toolUseId) {
    if (chatState.busy) return;
    // Find and clear the pending confirmation; also remember the prior assistant text so we can suppress its re-echo
    let priorContent = null;
    const last = [...chatState.messages].reverse().find(m => m.role === 'assistant' && m.pendingConfirmations);
    if (last) {
      last.pendingConfirmations = (last.pendingConfirmations || []).filter(pc => pc.toolUseId !== toolUseId);
      priorContent = last.content;
    }
    chatState.busy = true;
    renderChatScroll();
    try {
      await callAssistant({ confirmedToolUseIds: [toolUseId], suppressContent: priorContent });
    } catch (e) {
      chatState.messages.push({ role: 'assistant', content: 'Error: ' + e.message });
    } finally {
      chatState.busy = false;
      renderChatScroll();
    }
  }

  function cancelTool(toolUseId) {
    const last = [...chatState.messages].reverse().find(m => m.role === 'assistant' && m.pendingConfirmations);
    if (last) {
      last.pendingConfirmations = (last.pendingConfirmations || []).filter(pc => pc.toolUseId !== toolUseId);
      if (!last.toolCalls) last.toolCalls = [];
      last.toolCalls.push({ name: 'cancelled', summary: 'destructive action declined', status: 'cancelled' });
    }
    renderChatScroll();
  }

  // Send button + Enter handling + auto-grow
  $('#chat-send').addEventListener('click', () => sendMessage());
  $('#chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  $('#chat-input').addEventListener('input', (e) => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
  });

  // ===== Boot =====
  if (getCurrentUser()) showApp(); else showLogin();
})();
</script>
