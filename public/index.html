<!-- ===== PART 1 START ===== -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorkOrder Pro</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --success: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --pass: #16a34a;
    --fail: #dc2626;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea {
    font-family: inherit;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    width: 100%;
  }
  input[type="date"] { color-scheme: dark; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 500;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger); }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: var(--success); }
  .btn-success:hover { background: #16a34a; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 4px;
  }
  .btn-icon:hover { background: var(--panel-2); color: var(--text); }

  /* Login */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  }
  .login-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 360px;
    max-width: 90%;
  }
  .login-card h1 { margin: 0 0 8px; font-size: 24px; }
  .login-card p { margin: 0 0 24px; color: var(--muted); }
  .login-card label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); }
  .login-card .field { margin-bottom: 16px; }
  .login-card .btn { width: 100%; padding: 10px; }
  .login-error { color: var(--danger); margin-top: 12px; font-size: 13px; min-height: 18px; }

  /* App shell */
  #app { display: none; height: 100vh; }
  .app-grid {
    display: grid;
    grid-template-columns: 220px 1fr;
    height: 100%;
  }
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 16px;
  }
  .nav { flex: 1; padding: 8px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted);
    margin-bottom: 2px;
    user-select: none;
  }
  .nav-item:hover { background: var(--panel-2); color: var(--text); }
  .nav-item.active { background: var(--accent); color: white; }
  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .main {
    overflow-y: auto;
    padding: 24px;
  }
  .view-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .view-header h2 { margin: 0; font-size: 22px; }

  /* Cards / lists */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card-title {
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .card-meta { color: var(--muted); font-size: 12px; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
  }
  .badge-open { background: #1e40af; color: #dbeafe; }
  .badge-in_progress { background: #92400e; color: #fef3c7; }
  .badge-complete { background: #166534; color: #dcfce7; }
  .badge-low { background: #475569; color: #e2e8f0; }
  .badge-medium { background: #1e40af; color: #dbeafe; }
  .badge-high { background: #92400e; color: #fef3c7; }
  .badge-urgent { background: #991b1b; color: #fee2e2; }
  .empty {
    text-align: center;
    padding: 48px 16px;
    color: var(--muted);
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-lg { max-width: 900px; }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { margin: 0; font-size: 18px; }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .field-row { margin-bottom: 14px; }
  .field-row label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); }
  .field-row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Procedure builder */
  .pb-field-row {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 130px 1fr auto auto;
    gap: 8px;
    align-items: center;
  }
  .pb-field-row select, .pb-field-row input { padding: 6px 8px; font-size: 13px; }
  .pb-reorder { display: flex; flex-direction: column; gap: 2px; }
  .pb-reorder button { padding: 1px 6px; font-size: 10px; }

  /* Attached procedure on WO */
  .proc-instance {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .proc-instance-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 8px;
  }
  .proc-instance-head strong { font-size: 15px; }
  .proc-field {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 8px 0;
    border-top: 1px solid var(--border);
  }
  .proc-field:first-of-type { border-top: none; }
  .proc-field-label { font-size: 13px; }
  .proc-field-label .req { color: var(--danger); margin-left: 4px; }
  .proc-field-input { min-width: 180px; display: flex; gap: 6px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
  .proc-field-input input[type="text"], .proc-field-input input[type="number"], .proc-field-input input[type="date"] { width: 200px; }
  .pf-btn {
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 12px;
  }
  .pf-btn.pass.active { background: var(--pass); border-color: var(--pass); color: white; }
  .pf-btn.fail.active { background: var(--fail); border-color: var(--fail); color: white; }

  /* Signature pad */
  .sig-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }
  .sig-canvas {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 280px;
    height: 110px;
    touch-action: none;
    cursor: crosshair;
    display: block;
  }
  .sig-saved {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    max-width: 280px;
    max-height: 110px;
    display: block;
  }
  .sig-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* Photo field */
  .photo-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }
  .photo-thumb {
    max-width: 200px;
    max-height: 150px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: block;
  }
  .photo-row { display: flex; gap: 6px; align-items: center; }
  .photo-status { font-size: 11px; color: var(--muted); }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    cursor: zoom-out;
    padding: 20px;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 4px; }

  .activity-log {
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .activity-item {
    display: flex;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
    padding: 4px 0;
  }
  .activity-time { white-space: nowrap; }

  /* Mobile */
  @media (max-width: 720px) {
    .app-grid { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      left: -240px;
      top: 0;
      bottom: 0;
      width: 220px;
      z-index: 50;
      transition: left 0.2s;
    }
    .sidebar.open { left: 0; }
    .mobile-menu-btn { display: inline-flex !important; }
    .field-row-2col { grid-template-columns: 1fr; }
    .pb-field-row { grid-template-columns: 1fr; }
    .proc-field { grid-template-columns: 1fr; }
    .proc-field-input { justify-content: flex-start; }
    .sig-wrap, .photo-wrap { align-items: flex-start; }
  }
  .mobile-menu-btn {
    display: none;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 22px;
    margin-right: 10px;
  }
/* AI Generator panel */
  .ai-panel {
    background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(59,130,246,0.12));
    border: 1px solid #6366f1;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .ai-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 13px;
  }
  .ai-panel textarea { min-height: 70px; resize: vertical; }
  .ai-panel-actions { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }
  .ai-status { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 16px; }
  .btn-ai {
    background: linear-gradient(135deg, #8b5cf6, #3b82f6);
    color: white;
    border: none;
  }
  .btn-ai:hover { filter: brightness(1.1); }
  .btn-ai:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen">
  <div class="login-card">
    <h1>WorkOrder Pro</h1>
    <p>Sign in to continue</p>
    <div class="field">
      <label for="login-user">Username</label>
      <input id="login-user" type="text" autocomplete="username" />
    </div>
    <div class="field">
      <label for="login-pass">Password</label>
      <input id="login-pass" type="password" autocomplete="current-password" />
    </div>
    <button class="btn" id="login-btn">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app">
  <div class="app-grid">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">WorkOrder Pro</div>
      <nav class="nav">
        <div class="nav-item active" data-view="workorders">
          <span>📋</span><span>Work Orders</span>
        </div>
        <div class="nav-item" data-view="procedures">
          <span>📝</span><span>Procedures</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <span id="current-user">—</span>
        <button class="btn-icon" id="logout-btn" title="Sign out">⎋</button>
      </div>
    </aside>

    <main class="main">
      <section id="view-workorders">
        <div class="view-header">
          <div style="display:flex; align-items:center;">
            <button class="mobile-menu-btn" id="menu-btn">☰</button>
            <h2>Work Orders</h2>
          </div>
          <button class="btn" id="new-wo-btn">+ New Work Order</button>
        </div>
        <div id="wo-list" class="card-grid"></div>
      </section>

      <section id="view-procedures" style="display:none;">
        <div class="view-header">
          <div style="display:flex; align-items:center;">
            <button class="mobile-menu-btn" id="menu-btn-2">☰</button>
            <h2>Procedures</h2>
          </div>
          <button class="btn" id="new-proc-btn">+ New Procedure</button>
        </div>
        <div id="proc-list" class="card-grid"></div>
      </section>
    </main>
  </div>
</div>

<!-- ============ MODAL: NEW / EDIT WORK ORDER ============ -->
<div class="modal-backdrop" id="wo-form-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="wo-form-title">New Work Order</h3>
      <button class="btn-icon" data-close="wo-form-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <label>Title</label>
        <input id="wof-title" type="text" />
      </div>
      <div class="field-row">
        <label>Description</label>
        <textarea id="wof-desc" rows="3"></textarea>
      </div>
      <div class="field-row field-row-2col">
        <div>
          <label>Status</label>
          <select id="wof-status">
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="complete">Complete</option>
          </select>
        </div>
        <div>
          <label>Priority</label>
          <select id="wof-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <label>Assignee</label>
        <input id="wof-assignee" type="text" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="wo-form-modal">Cancel</button>
      <button class="btn" id="wof-save">Save</button>
    </div>
  </div>
</div>
<!-- ===== PART 1 END ===== -->
<!-- ===== PART 2A START ===== -->

<!-- ============ MODAL: WORK ORDER DETAIL ============ -->
<div class="modal-backdrop" id="wo-detail-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="wod-title">Work Order</h3>
      <button class="btn-icon" data-close="wo-detail-modal">✕</button>
    </div>
    <div class="modal-body" id="wod-body"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="wod-delete">Delete</button>
      <button class="btn btn-secondary" data-close="wo-detail-modal">Close</button>
      <button class="btn" id="wod-edit">Edit</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: PROCEDURE BUILDER ============ -->
<div class="modal-backdrop" id="proc-builder-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="pb-title">New Procedure</h3>
      <button class="btn-icon" data-close="proc-builder-modal">✕</button>
    </div>
    <div class="modal-body">
      <div id="ai-panel-wrap" style="display:none;">
        <div class="ai-panel">
          <div class="ai-panel-header">
            <span>✨ Generate with AI</span>
            <button class="btn-icon" id="ai-cancel" title="Hide">✕</button>
          </div>
          <textarea id="ai-prompt" placeholder="Describe the procedure you need. e.g. 'Daily forklift safety inspection' or 'Monthly HVAC filter and coil check'"></textarea>
          <div class="ai-panel-actions">
            <button class="btn btn-ai" id="ai-generate">Generate</button>
          </div>
          <div class="ai-status" id="ai-status"></div>
        </div>
      </div>
      <div class="field-row" style="display:flex; justify-content:flex-end; margin-bottom:8px;">
        <button class="btn btn-ai btn-sm" id="ai-show">✨ Generate with AI</button>
      </div>
      <div class="field-row">
        <label>Procedure Name</label>
        <input id="pb-name" type="text" placeholder="e.g. Daily Forklift Inspection" />
      </div>
      <div class="field-row">
        <label>Description</label>
        <textarea id="pb-desc" rows="2"></textarea>
      </div>
      <div class="field-row">
        <label>Fields</label>
        <div id="pb-fields"></div>
        <button class="btn btn-secondary btn-sm" id="pb-add-field" style="margin-top:8px;">+ Add Field</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="pb-delete" style="margin-right:auto; display:none;">Delete</button>
      <button class="btn btn-secondary" data-close="proc-builder-modal">Cancel</button>
      <button class="btn" id="pb-save">Save Procedure</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: ATTACH PROCEDURE PICKER ============ -->
<div class="modal-backdrop" id="attach-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Attach Procedure</h3>
      <button class="btn-icon" data-close="attach-modal">✕</button>
    </div>
    <div class="modal-body" id="attach-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="attach-modal">Cancel</button>
    </div>
  </div>
</div>

<!-- ============ LIGHTBOX ============ -->
<div class="lightbox" id="lightbox"><img id="lightbox-img" alt="" /></div>

<script>
(function () {
  "use strict";

  // ---------- Auth ----------
  const USERS = { bill: "bill", serina: "serina" };
  const LS_USER = "wop_user";
  const getCurrentUser = () => localStorage.getItem(LS_USER);
  const setCurrentUser = (u) => localStorage.setItem(LS_USER, u);
  const clearCurrentUser = () => localStorage.removeItem(LS_USER);

  // ---------- API ----------
  const API = window.location.origin + "/api";
  async function apiFetch(path, opts) {
    opts = opts || {};
    opts.headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
    if (opts.body && typeof opts.body !== "string") opts.body = JSON.stringify(opts.body);
    const r = await fetch(API + path, opts);
    if (!r.ok) {
      const t = await r.text();
      throw new Error("API " + r.status + ": " + t);
    }
    const ct = r.headers.get("content-type") || "";
    return ct.includes("application/json") ? r.json() : r.text();
  }

  // ---------- State ----------
  const state = {
    view: "workorders",
    workorders: [],
    procedures: [],
    activeWO: null,
    editingProc: null,
    pbFields: [],
  };

  // ---------- DOM helpers ----------
  const $ = (s) => document.querySelector(s);
  const $$ = (s) => Array.from(document.querySelectorAll(s));
  function el(tag, attrs, children) {
    const e = document.createElement(tag);
    if (attrs) for (const k in attrs) {
      if (k === "class") e.className = attrs[k];
      else if (k === "html") e.innerHTML = attrs[k];
      else if (k.startsWith("on") && typeof attrs[k] === "function") e.addEventListener(k.slice(2), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    }
    if (children) (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null) return;
      e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
    return e;
  }
  const escapeHtml = (s) => String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  function fmtDate(iso) {
    if (!iso) return "";
    try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
  }

  // ---------- Modals ----------
  const openModal = (id) => document.getElementById(id).classList.add("show");
  const closeModal = (id) => document.getElementById(id).classList.remove("show");
  document.addEventListener("click", (e) => {
    const c = e.target.getAttribute && e.target.getAttribute("data-close");
    if (c) closeModal(c);
  });

  // Lightbox
  function showLightbox(src) {
    $("#lightbox-img").src = src;
    $("#lightbox").classList.add("show");
  }

  // ---------- Image resize ----------
  function resizeImage(file, maxDim, quality) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = () => {
        const img = new Image();
        img.onerror = reject;
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
          else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
          const canvas = document.createElement("canvas");
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ---------- Signature pad ----------
  function makeSignaturePad(initialDataURL, onSave, onClear) {
    const wrap = el("div", { class: "sig-wrap" });
    const canvas = el("canvas", { class: "sig-canvas", width: "560", height: "220" });
    canvas.style.width = "280px"; canvas.style.height = "110px";
    const ctx = canvas.getContext("2d");
    ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = "#000";
    let drawing = false, dirty = false;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
      const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      return { x: cx * sx, y: cy * sy };
    }
    function start(e) { e.preventDefault(); drawing = true; dirty = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
    function move(e) { if (!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    function end() { if (!drawing) return; drawing = false; if (dirty) { dirty = false; onSave(canvas.toDataURL("image/png")); } }

    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", move);
    canvas.addEventListener("mouseup", end);
    canvas.addEventListener("mouseleave", end);
    canvas.addEventListener("touchstart", start, { passive: false });
    canvas.addEventListener("touchmove", move, { passive: false });
    canvas.addEventListener("touchend", end);

    if (initialDataURL) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      img.src = initialDataURL;
    }

    const clearBtn = el("button", { class: "btn btn-sm btn-secondary",
      onclick: () => { ctx.clearRect(0, 0, canvas.width, canvas.height); onClear(); }
    }, "Clear");

    wrap.appendChild(canvas);
    wrap.appendChild(el("div", { class: "sig-row" }, [clearBtn]));
    return wrap;
  }

  function showSavedSignature(dataURL, onChange, onClear) {
    const wrap = el("div", { class: "sig-wrap" });
    const img = el("img", { class: "sig-saved", src: dataURL, alt: "signature" });
    img.addEventListener("click", () => showLightbox(dataURL));

    const clearBtn = el("button", { class: "btn btn-sm btn-secondary", onclick: onClear }, "Clear");
    wrap.appendChild(img);
    wrap.appendChild(el("div", { class: "sig-row" }, [changeBtn, clearBtn]));
    return wrap;
  }

  // ---------- Photo field UI ----------
  function makePhotoField(currentDataURL, onChange) {
    const wrap = el("div", { class: "photo-wrap" });
    const status = el("div", { class: "photo-status" });
    const fileInput = el("input", { type: "file", accept: "image/*", capture: "environment", style: "display:none;" });
    const uploadBtn = el("button", { class: "btn btn-sm btn-secondary", onclick: () => fileInput.click() }, currentDataURL ? "Replace Photo" : "Add Photo");
    const removeBtn = el("button", { class: "btn btn-sm btn-secondary", onclick: () => onChange(null) }, "Remove");

    fileInput.addEventListener("change", async () => {
      const f = fileInput.files && fileInput.files[0];
      if (!f) return;
      status.textContent = "Processing…";
      try {
        const data = await resizeImage(f, 1280, 0.7);
        status.textContent = "Saving…";
        await onChange(data);
        status.textContent = "";
      } catch (e) {
        status.textContent = "";
        alert("Photo failed: " + e.message);
      }
      fileInput.value = "";
    });

    if (currentDataURL) {
      const img = el("img", { class: "photo-thumb", src: currentDataURL, alt: "photo" });
      img.addEventListener("click", () => showLightbox(currentDataURL));
      wrap.appendChild(img);
    }
    const row = el("div", { class: "photo-row" }, [uploadBtn]);
    if (currentDataURL) row.appendChild(removeBtn);
    wrap.appendChild(row);
    wrap.appendChild(status);
    wrap.appendChild(fileInput);
    return wrap;
  }

  // ---------- Render procedure instance ----------
  function renderProcedureInstance(w, inst) {
    const wrap = el("div", { class: "proc-instance" });
    const head = el("div", { class: "proc-instance-head" }, [
      el("strong", null, inst.name),
      el("div", null, [
        el("span", { class: "badge badge-" + inst.status }, inst.status.replace("_", " ")),
        document.createTextNode(" "),
        el("button", {
          class: "btn btn-sm " + (inst.status === "complete" ? "btn-secondary" : "btn-success"),
          onclick: async () => {
            const next = inst.status === "complete" ? "in_progress" : "complete";
            try {
              await apiFetch("/workorders/" + w.id + "/procedures/" + inst.instanceId, { method: "PATCH", body: { status: next } });
              await openWorkOrder(w.id);
            } catch (e) { alert("Failed: " + e.message); }
          },
        }, inst.status === "complete" ? "Reopen" : "Mark Complete"),
        document.createTextNode(" "),
        el("button", {
          class: "btn btn-sm btn-danger",
          onclick: async () => {
            if (!confirm("Detach this procedure from the work order?")) return;
            try {
              await apiFetch("/workorders/" + w.id + "/procedures/" + inst.instanceId, { method: "DELETE" });
              await openWorkOrder(w.id);
            } catch (e) { alert("Failed: " + e.message); }
          },
        }, "Detach"),
      ]),
    ]);
    wrap.appendChild(head);

    if (inst.description) {
      wrap.appendChild(el("div", { class: "card-meta", style: "margin-bottom:8px;" }, inst.description));
    }

    (inst.fields || []).forEach(f => {
      const row = el("div", { class: "proc-field" });
      row.appendChild(el("div", { class: "proc-field-label", html:
        escapeHtml(f.label) + (f.required ? '<span class="req">*</span>' : '') +
        ' <span class="card-meta">(' + f.type + ')</span>'
      }));
      const inputWrap = el("div", { class: "proc-field-input" });
      const val = inst.responses ? inst.responses[f.id] : undefined;

      if (f.type === "checkbox") {
        const cb = el("input", { type: "checkbox" });
        if (val === true) cb.checked = true;
        cb.addEventListener("change", () => {
          inst.responses = inst.responses || {};
          inst.responses[f.id] = cb.checked;
          queueResponseSave(w.id, inst.instanceId, { [f.id]: cb.checked });
        });
        inputWrap.appendChild(cb);
      } else if (f.type === "text") {
        const input = el("input", { type: "text" });
        if (val != null) input.value = val;
        input.addEventListener("input", () => {
          inst.responses = inst.responses || {};
          inst.responses[f.id] = input.value;
          queueResponseSave(w.id, inst.instanceId, { [f.id]: input.value });
        });
        inputWrap.appendChild(input);
      } else if (f.type === "number") {
        const input = el("input", { type: "number" });
        if (val != null) input.value = val;
        input.addEventListener("input", () => {
          inst.responses = inst.responses || {};
          const n = input.value === "" ? null : Number(input.value);
          inst.responses[f.id] = n;
          queueResponseSave(w.id, inst.instanceId, { [f.id]: n });
        });
        inputWrap.appendChild(input);
      } else if (f.type === "passfail") {
        const pass = el("button", { class: "pf-btn pass" + (val === "pass" ? " active" : "") }, "Pass");
        const fail = el("button", { class: "pf-btn fail" + (val === "fail" ? " active" : "") }, "Fail");
        function set(v) {
          inst.responses = inst.responses || {};
          inst.responses[f.id] = v;
          pass.classList.toggle("active", v === "pass");
          fail.classList.toggle("active", v === "fail");
          queueResponseSave(w.id, inst.instanceId, { [f.id]: v });
        }
        pass.addEventListener("click", () => set("pass"));
        fail.addEventListener("click", () => set("fail"));
        inputWrap.appendChild(pass);
        inputWrap.appendChild(fail);
      } else if (f.type === "date") {
        const input = el("input", { type: "date" });
        if (val) input.value = val;
        input.addEventListener("change", () => {
          inst.responses = inst.responses || {};
          const v = input.value || null;
          inst.responses[f.id] = v;
          queueResponseSave(w.id, inst.instanceId, { [f.id]: v });
        });
        inputWrap.appendChild(input);
      } else if (f.type === "signature") {
        const mount = el("div");
        function renderSig(currentVal) {
          mount.innerHTML = "";
          if (currentVal && typeof currentVal === "string" && currentVal.startsWith("data:")) {
            mount.appendChild(showSavedSignature(currentVal,
              () => { renderSig(null); },
              async () => {
                inst.responses = inst.responses || {};
                inst.responses[f.id] = null;
                await saveResponseNow(w.id, inst.instanceId, { [f.id]: null });
                renderSig(null);
              }
            ));
          } else {
            mount.appendChild(makeSignaturePad(null,
              async (dataURL) => {
                inst.responses = inst.responses || {};
                inst.responses[f.id] = dataURL;
                await saveResponseNow(w.id, inst.instanceId, { [f.id]: dataURL });
                renderSig(dataURL);
              },
              async () => {
                inst.responses = inst.responses || {};
                inst.responses[f.id] = null;
                await saveResponseNow(w.id, inst.instanceId, { [f.id]: null });
              }
            ));
          }
        }
        renderSig(val);
        inputWrap.appendChild(mount);
      } else if (f.type === "photo") {
        const mount = el("div");
        function renderPhoto(currentVal) {
          mount.innerHTML = "";
          mount.appendChild(makePhotoField(
            currentVal && typeof currentVal === "string" && currentVal.startsWith("data:") ? currentVal : null,
            async (dataURL) => {
              inst.responses = inst.responses || {};
              inst.responses[f.id] = dataURL;
              await saveResponseNow(w.id, inst.instanceId, { [f.id]: dataURL });
              renderPhoto(dataURL);
            }
          ));
        }
        renderPhoto(val);
        inputWrap.appendChild(mount);
      }

      row.appendChild(inputWrap);
      wrap.appendChild(row);
    });

    return wrap;
  }

  function renderPBFields() {
    const wrap = $("#pb-fields");
    wrap.innerHTML = "";
    if (!state.pbFields.length) {
      wrap.appendChild(el("div", { class: "card-meta" }, "No fields yet. Add one below."));
      return;

    state.pbFields.forEach((f, i) => {
      const row = el("div", { class: "pb-field-row" });

        const opt = new Option(label, v, false, f.type === v);

      typeSel.value = f.type;
      typeSel.addEventListener("change", () => { f.type = typeSel.value; });

      const labelInput = el("input", { type: "text", placeholder: "Field label" });
      labelInput.value = f.label || "";
      labelInput.addEventListener("input", () => { f.label = labelInput.value; });

      const reqWrap = el("label", { style: "display:flex; align-items:center; gap:4px; font-size:12px; color:var(--muted); white-space:nowrap;" });
      const reqCb = el("input", { type: "checkbox" });
      if (f.required) reqCb.checked = true;
      reqCb.addEventListener("change", () => { f.required = reqCb.checked; });
      reqWrap.appendChild(reqCb);
      reqWrap.appendChild(document.createTextNode("Required"));

      const reorder = el("div", { class: "pb-reorder" }, [
        el("button", { class: "btn-secondary", onclick: () => moveField(i, -1) }, "▲"),
        el("button", { class: "btn-secondary", onclick: () => moveField(i, 1) }, "▼"),
      ]);
      const del = el("button", { class: "btn btn-sm btn-danger", onclick: () => { state.pbFields.splice(i, 1); renderPBFields(); } }, "✕");

      row.appendChild(typeSel);
      row.appendChild(labelInput);
      row.appendChild(reqWrap);
      row.appendChild(el("div", { style: "display:flex; gap:6px; align-items:center;" }, [reorder, del]));
      wrap.appendChild(row);
    });
  }

  function moveField(i, dir) {
    const j = i + dir;
    if (j < 0 || j >= state.pbFields.length) return;
    const tmp = state.pbFields[i];
    state.pbFields[i] = state.pbFields[j];
    state.pbFields[j] = tmp;
    renderPBFields();
  }

  $("#pb-add-field").addEventListener("click", () => {
    state.pbFields.push({ type: "checkbox", label: "", required: false });
    renderPBFields();
  });

  $("#pb-save").addEventListener("click", async () => {
    const name = $("#pb-name").value.trim();
    if (!name) { alert("Name required"); return; }
    const payload = {
      name,
      description: $("#pb-desc").value,
      fields: state.pbFields.map(f => ({
        id: f.id,
        type: f.type,
        label: (f.label || "").trim() || "Untitled field",
        required: !!f.required,
      })),
    };
    try {
      if (state.editingProc) await apiFetch("/procedures/" + state.editingProc.id, { method: "PUT", body: payload });
      else await apiFetch("/procedures", { method: "POST", body: payload });
      closeModal("proc-builder-modal");
      await refreshAll();
    } catch (e) { alert("Save failed: " + e.message); }
  });

  $("#pb-delete").addEventListener("click", async () => {
    const p = state.editingProc; if (!p) return;
    if (!confirm("Delete procedure '" + p.name + "'? Already-attached instances on work orders are not affected.")) return;
    try {
      await apiFetch("/procedures/" + p.id, { method: "DELETE" });
      closeModal("proc-builder-modal");
      await refreshAll();
    } catch (e) { alert("Delete failed: " + e.message); }
  });

  // ---------- Boot ----------
  if (getCurrentUser()) showApp(); else showLogin();
})();
</script>
</body>
</html>
